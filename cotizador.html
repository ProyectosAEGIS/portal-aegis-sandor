        function getMedian(arr) {
            if(arr.length === 0) return 0;
            const sorted = arr.slice().sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);

                    )}

                    {/* SIDEBAR CORPORATIVO */}
                    <aside className={`fixed inset-y-0 left-0 bg-[#12334F] w-64 text-white flex flex-col transition-transform duration-300 z-40 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="h-20 flex items-center px-6 border-b border-white/10 bg-[#0e273d] flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="p-1.5 bg-gradient-to-br from-[#58C9E8] to-[#163f73] rounded-lg shadow-lg">
                                    <Shield size={28} className="text-white" strokeWidth={2.5} />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-wide uppercase leading-tight">AEGIS</h1>
                                    <p className="text-[#58C9E8] text-[10px] font-medium tracking-widest uppercase">Insurance</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            <p className="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Menú Principal</p>
                            {menuItems.map(item => {
                                const Icon = item.icon;
                                const isActive = activeMenu === item.id;
                                
                                return (
                                    <button 
                                        key={item.id}
                                        onClick={() => { setActiveMenu(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all text-sm font-medium ${
                                            isActive ? 'bg-gradient-to-r from-[#163f73] to-[#12334F] border border-[#58C9E8]/30 text-white shadow-md' : 'text-gray-300 hover:bg-white/5 hover:text-white'
                                        }`}
                                    >
                                        <Icon size={18} className={isActive ? 'text-[#58C9E8]' : 'text-gray-400'} />
                                        {item.label}
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="p-4 border-t border-white/10 bg-[#0e273d] flex-shrink-0">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-[#58C9E8] flex items-center justify-center text-[#12334F] font-bold text-sm">GS</div>
                                <div className="text-left flex-1">
                                    <p className="text-sm font-semibold text-white leading-tight">Grupo Sandor</p>
                                    <p className="text-xs text-[#58C9E8]">Cliente Corporativo</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    {/* CONTENEDOR PRINCIPAL */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        
                        <header className="h-20 bg-white shadow-sm border-b border-gray-200 flex items-center justify-between px-4 sm:px-8 z-10 flex-shrink-0">
                            <div className="flex items-center gap-4">
                                <button className="md:hidden text-gray-500 hover:text-[#163f73] p-1" onClick={() => setIsMobileMenuOpen(true)}>
                                    <MenuIcon size={26} />
                                </button>
                                <h2 className="text-xl font-bold text-[#163f73] hidden sm:block">Portal de Servicios AEGIS</h2>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm text-gray-500 font-medium hidden md:block">
                                    {new Date().toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </span>
                                <div className="w-px h-6 bg-gray-300 hidden md:block"></div>
                                <button className="relative p-2 text-gray-400 hover:text-[#163f73] transition-colors rounded-full hover:bg-gray-100"><Bell size={20} /></button>
                                
                                {/* CANDADO O SELECTOR DE ROL */}
                                {isDirectorUnlocked ? (
                                    <div className="flex items-center bg-gray-100 p-1 rounded-full shadow-inner border border-gray-200 ml-2">
                                        <button onClick={() => setRolActivo('cliente')} className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${rolActivo === 'cliente' ? 'bg-[#58C9E8] text-[#12334F]' : 'text-gray-400'}`}>CLIENTE</button>
                                        <button onClick={() => setRolActivo('director')} className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${rolActivo === 'director' ? 'bg-[#163f73] text-white' : 'text-gray-400'}`}>DIRECTOR</button>
                                    </div>
                                ) : (
                                    <button onClick={handleAdminLogin} className="relative p-2 text-gray-400 hover:text-[#163f73] transition-colors rounded-full hover:bg-gray-100 ml-2" title="Acceso Exclusivo AEGIS">
                                        <Lock size={20} />
                                    </button>
                                )}
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto bg-[#f4f7f9] relative w-full">

                            {/* ========================================================= */}
                            {/* VISTA 1: COTIZADOR                                        */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'cotizador' ? 'block p-4 md:p-8 pb-20' : 'hidden'}>
                                
                                {/* Header Cotizador */}
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm rounded-xl flex justify-between items-center mb-6 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-[#58C9E8] opacity-10 rounded-full -translate-y-1/2 translate-x-1/4"></div>
                                    <div className="flex items-center gap-3 z-10">
                                        <div className="p-2 bg-white/10 rounded-lg"><Calculator size={32} className="text-[#58C9E8]" /></div>
                                        <div>
                                            <h1 className="text-2xl font-bold tracking-wide">{isDirector ? 'Completar Orden de Servicio' : 'Nueva Pre-Orden de Seguros'}</h1>
                                            <p className="text-[#58C9E8] text-sm font-medium">
                                                {estadoSolicitud === 'Nueva' ? 'Paso 1: Información Base' : `Estado: ${estadoSolicitud.toUpperCase()}`}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-right hidden md:block z-10">
                                        <p className="text-xs text-gray-300">ID SOLICITUD</p>
                                        <p className="font-mono font-bold text-xl flex items-center gap-2">
                                            {isLoadingNube && <RefreshCw size={16} className="animate-spin text-[#58C9E8]" />}
                                            {consecutivo}
                                        </p>
                                    </div>
                                </div>

                                <div className="max-w-[1600px] mx-auto space-y-6">
                                    {/* Bloque 0: Solicitante */}
                                    <div className={sectionCls}>
                                        {isDirector && <div className="absolute top-0 right-0 p-3"><Lock size={20} className="text-gray-300" /></div>}
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><User size={20} className="text-[#58C9E8]" /> 0. Datos del Solicitante</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div><label className={labelCls}>Nombre Solicitante *</label><input type="text" className={inputCls} disabled={isDirector} value={interno.solicitante} onChange={e => setInterno({...interno, solicitante: e.target.value})} /></div>
                                            <div><label className={labelCls}>Correo Electrónico *</label><input type="email" className={inputCls} disabled={isDirector} value={interno.solicitanteEmail} onChange={e => setInterno({...interno, solicitanteEmail: e.target.value})} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Asunto / Proyecto</label><input type="text" className={inputCls} disabled={isDirector} value={interno.asunto} onChange={e => setInterno({...interno, asunto: e.target.value})} /></div>
                                        </div>
                                        
                                        {/* TIPO DE SOLICITUD (ALFABÉTICO) */}
                                        <div className="mt-4 mb-4">
                                            <label className={labelCls}>Tipo de Solicitud</label>
                                            <div className="flex flex-wrap gap-4 mt-2">
                                                {[
                                                    { key: 'cumplimientoEstatales', label: 'Cumplimiento Estatales' },
                                                    { key: 'cumplimientoParticulares', label: 'Cumplimiento Particulares' },
                                                    { key: 'disposicionLegal', label: 'Disposición Legal' },
                                                    { key: 'prorroga', label: 'Prórroga' },
                                                    { key: 'responsabilidadCivil', label: 'Responsabilidad Civil' },
                                                    { key: 'seriedadOferta', label: 'Seriedad de la Oferta' },
                                                    { key: 'otros', label: 'Otros' }
                                                ].map(({key, label}) => (
                                                    <label key={key} className={`flex items-center gap-2 text-sm text-gray-700 ${isDirector ? 'opacity-70 cursor-not-allowed' : 'cursor-pointer'}`}>
                                                        <input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" disabled={isDirector} checked={interno.tipos[key] || false} onChange={() => handleCheckboxTipos(key)} />
                                                        {label}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        {!isDirector && (
                                            <div className="bg-[#eef3f8] p-4 rounded-lg border border-[#cdd7e0]">
                                                <label className={labelCls}>Soportes y Contratos (PDF)</label>
                                                <div className="flex items-center gap-3 mt-2">
                                                    <label className="cursor-pointer bg-white px-4 py-2 border border-[#cdd7e0] rounded-md text-sm font-medium hover:bg-gray-50 flex items-center gap-2 shadow-sm">
                                                        <Paperclip size={16} className="text-[#5c7792]" /> Seleccionar Archivos
                                                        <input type="file" multiple className="sr-only" onChange={handleFileChange} />
                                                    </label>
                                                    <span className="text-sm text-[#5c7792]">{interno.archivos.length === 0 ? "Ningún archivo" : `${interno.archivos.length} archivo(s) listo para subir`}</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Bloque 1: Tomador */}
                                    <div className={sectionCls}>
                                        {isDirector && <div className="absolute top-0 right-0 p-3"><Lock size={20} className="text-gray-300" /></div>}
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><Building size={20} className="text-[#58C9E8]" /> 1. Tomador y Asegurado</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div><label className={labelCls}>Tomador Razón Social *</label><input type="text" className={inputCls} disabled={isDirector} value={tomador.nombre} onChange={e => setTomador({...tomador, nombre: e.target.value})} /></div>
                                            <div><label className={labelCls}>Tomador NIT *</label><input type="text" className={inputCls} disabled={isDirector} value={tomador.nit} onChange={e => setTomador({...tomador, nit: e.target.value})} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Dirección Tomador</label><input type="text" className={inputCls} disabled={isDirector} value={tomador.direccion} onChange={e => setTomador({...tomador, direccion: e.target.value})} /></div>
                                            <div><label className={labelCls}>Teléfono / Celular</label><input type="text" className={inputCls} disabled={isDirector} value={tomador.telefono} onChange={e => setTomador({...tomador, telefono: e.target.value})} /></div>
                                            <div><label className={labelCls}>E-mail</label><input type="email" className={inputCls} disabled={isDirector} value={tomador.email} onChange={e => setTomador({...tomador, email: e.target.value})} /></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-dashed border-[#dce4ec]">
                                            <div><label className={labelCls}>Asegurado Razón Social *</label><input type="text" className={inputCls} disabled={isDirector} value={asegurado.nombre} onChange={e => setAsegurado({...asegurado, nombre: e.target.value})} /></div>
                                            <div><label className={labelCls}>Asegurado NIT</label><input type="text" className={inputCls} disabled={isDirector} value={asegurado.nit} onChange={e => setAsegurado({...asegurado, nit: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    {/* Bloque 2: Contrato y Prórroga */}
                                    <div className={sectionCls}>
                                        {isDirector && <div className="absolute top-0 right-0 p-3"><Lock size={20} className="text-gray-300" /></div>}
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><FileText size={20} className="text-[#58C9E8]" /> 2. Datos del Contrato</h3>
                                        
                                        {/* NUEVO BLOQUE DE BÚSQUEDA DE PRÓRROGA */}
                                        {interno.tipos.prorroga && (
                                            <div className="bg-yellow-50 p-5 rounded-xl border border-yellow-200 mb-6 shadow-sm transition-all">
                                                <h4 className="font-bold text-yellow-800 mb-3 flex items-center gap-2">
                                                    <Search size={18} /> Búsqueda de Póliza Matriz (Prórroga)
                                                </h4>
                                                {(!tomador.nit || !asegurado.nit) ? (
                                                    <p className="text-sm text-yellow-700">Por favor, diligencie el <b>NIT del Tomador</b> y el <b>NIT del Asegurado</b> en el Bloque 1 para buscar pólizas previas en el sistema.</p>
                                                ) : polizasDisponiblesProrroga.length === 0 ? (
                                                    <p className="text-sm text-red-600 font-bold">No se encontraron pólizas emitidas y entregadas para esta combinación de NITs.</p>
                                                ) : (
                                                    <div className="space-y-3">
                                                        <p className="text-sm text-yellow-800 font-medium">Seleccione la póliza sobre la cual se aplicará la prórroga:</p>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-60 overflow-y-auto pr-2">
                                                            {polizasDisponiblesProrroga.map(p => {
                                                                let parsedForm = {};
                                                                try { parsedForm = JSON.parse(p.formularioCompleto); } catch(e){}
                                                                return (
                                                                    <label key={p.consecutivo} className={`flex items-start gap-3 p-4 border rounded-xl cursor-pointer transition-colors ${prorrogaRef?.consecutivo === p.consecutivo ? 'bg-yellow-100 border-yellow-400 shadow-sm' : 'bg-white hover:bg-yellow-50 border-yellow-200'}`}>
                                                                        <input type="radio" name="prorrogaSelect" className="mt-1 w-4 h-4 text-yellow-600" 
                                                                            checked={prorrogaRef?.consecutivo === p.consecutivo}
                                                                            onChange={() => {
                                                                                let pf = {};
                                                                                try { pf = JSON.parse(p.formularioCompleto); } catch(e) {}
                                                                                setProrrogaRef({
                                                                                    consecutivo: p.consecutivo,
                                                                                    numeroPoliza: pf.numeroPoliza || '',
                                                                                    aseguradora: pf.aseguradora || '',
                                                                                    ramoPoliza: pf.ramoPoliza || ''
                                                                                });
                                                                                if (pf.contrato) {
                                                                                    setContrato(prev => ({
                                                                                        ...prev,
                                                                                        objeto: pf.contrato.objeto || prev.objeto,
                                                                                        numero: pf.contrato.numero || prev.numero
                                                                                    }));
                                                                                }
                                                                                showAlert('Póliza Enlazada', `Se han importado los datos de la póliza ${pf.numeroPoliza || p.consecutivo}. Por favor ingrese las nuevas fechas y el valor de la adición.`);
                                                                            }}
                                                                            disabled={isDirector}
                                                                        />
                                                                        <div className="flex flex-col">
                                                                            <span className="font-black text-[#12334F] text-sm mb-1">Póliza / Anexo: {parsedForm.numeroPoliza || 'N/A'}</span>
                                                                            <span className="text-xs text-gray-600"><b>Aseguradora:</b> {parsedForm.aseguradora || 'N/A'}</span>
                                                                            <span className="text-xs text-gray-600"><b>Ramo:</b> {parsedForm.ramoPoliza || 'N/A'}</span>
                                                                            <span className="text-[10px] text-gray-400 mt-1 uppercase tracking-wider">Ref Original: {p.consecutivo}</span>
                                                                        </div>
                                                                    </label>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-6 gap-4">
                                            <div className="md:col-span-6"><label className={labelCls}>Objeto del Contrato *</label><textarea maxLength="2000" className={`${inputCls} h-20`} disabled={isDirector} value={contrato.objeto} onChange={e => setContrato({...contrato, objeto: e.target.value})}></textarea></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Número</label><input type="text" className={inputCls} disabled={isDirector} value={contrato.numero} onChange={e => setContrato({...contrato, numero: e.target.value})} /></div>
                                            <div className="md:col-span-2">
                                                <label className={labelCls}>Valor CON IVA *</label>
                                                <div className="relative">
                                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                                    <input type="text" className={`${inputCls} pl-8`} disabled={isDirector} value={contrato.valorConIva?contrato.valorConIva.toLocaleString('es-CO'):''} onChange={e => setContrato({...contrato, valorConIva: parseCurrency(e.target.value)})} />
                                                </div>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className={labelCls}>Valor SIN IVA</label>
                                                <div className="relative">
                                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none opacity-70">$</span>
                                                    <input type="text" className={`${inputCls} bg-[#e4ebf1] font-semibold pl-8 cursor-not-allowed`} disabled value={valorSinIva ? valorSinIva.toLocaleString('es-CO', {maximumFractionDigits: 0}) : '0'} />
                                                </div>
                                            </div>
                                            <div className="md:col-span-2"><label className={labelCls}>Desde</label><input type="date" className={inputCls} disabled={isDirector} value={contrato.desde} onChange={e => {
                                                const newDesde = e.target.value; let newDuracion = contrato.duracion;
                                                if (newDesde && contrato.hasta) { newDuracion = Math.ceil((new Date(contrato.hasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24)) > 0 ? Math.ceil((new Date(contrato.hasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24)) : 0; }
                                                setContrato({...contrato, desde: newDesde, duracion: newDuracion});
                                            }} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Hasta</label><input type="date" className={inputCls} disabled={isDirector} value={contrato.hasta} onChange={e => {
                                                const newHasta = e.target.value; let newDuracion = contrato.duracion;
                                                if (contrato.desde && newHasta) { newDuracion = Math.ceil((new Date(newHasta) - new Date(contrato.desde)) / (1000 * 60 * 60 * 24)) > 0 ? Math.ceil((new Date(newHasta) - new Date(contrato.desde)) / (1000 * 60 * 60 * 24)) : 0; }
                                                setContrato({...contrato, hasta: newHasta, duracion: newDuracion});
                                            }} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Duración (Días)</label><input type="number" className={`${inputCls} bg-[#e4ebf1] font-semibold cursor-not-allowed`} disabled value={contrato.duracion} /></div>
                                        </div>
                                    </div>

                                    {/* BLOQUES EXCLUSIVOS DEL DIRECTOR (Amparos y Totales) */}
                                    {(isDirector && (estadoSolicitud === 'Pre-Orden' || estadoSolicitud === 'Nueva')) && (
                                        <div className="space-y-6 mt-8 border-t-4 border-[#58C9E8] pt-8 max-w-[1600px] mx-auto">
                                            <div className="bg-[#e8f7fb] text-[#163f73] px-6 py-4 rounded-xl border border-[#58C9E8]/30 flex items-center justify-between">
                                                <div>
                                                    <h3 className="font-bold text-lg">Zona de Liquidación</h3>
                                                    <p className="text-sm opacity-80">Asigne los amparos extraídos de los contratos anexos y genere la orden final.</p>
                                                </div>
                                            </div>

                                            <div className={sectionCls}>
                                                <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><Calculator size={20} className="text-[#58C9E8]" /> 3. Amparos y Garantías</h3>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-xs text-left min-w-[1000px]">
                                                        <thead className="bg-[#12334F] text-white">
                                                            <tr>
                                                                <th className="p-3 rounded-tl-lg">AMPARO</th>
                                                                <th className="p-3 w-64">VIGENCIA (DESDE - HASTA)</th>
                                                                <th className="p-3 text-center w-16">DÍAS</th>
                                                                <th className="p-3 text-center w-24">% Vr. Aseg.</th>
                                                                <th className="p-3 text-right w-44">VALOR ASEGURADO</th>
                                                                <th className="p-3 text-center w-20">TASA %</th>
                                                                <th className="p-3 text-right w-40 rounded-tr-lg">PRIMA</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-200">
                                                            {amparos.map(a => (
                                                                <tr key={a.id} className={a.activo ? "bg-cyan-50/50" : "hover:bg-slate-50 transition-colors"}>
                                                                    <td className="p-3">
                                                                        <label className="flex items-center gap-2 cursor-pointer w-full h-full m-0">
                                                                            <input type="checkbox" className="w-4 h-4 rounded text-[#163f73] cursor-pointer" checked={a.activo} onChange={() => handleAmparoToggle(a.id)} />
                                                                            <span className={`select-none ${a.activo ? "font-bold text-[#163f73]" : ""}`}>{a.nombre}</span>
                                                                        </label>
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <div className="flex gap-1">
                                                                            <input type="date" className="p-1 border border-[#cdd7e0] rounded w-full bg-white/50 focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.desde} onChange={e => handleAmparoField(a.id, 'desde', e.target.value)} />
                                                                            <input type="date" className="p-1 border border-[#cdd7e0] rounded w-full bg-white/50 focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.hasta} onChange={e => handleAmparoField(a.id, 'hasta', e.target.value)} />
                                                                        </div>
                                                                    </td>
                                                                    <td className="p-3 text-center font-bold text-slate-500">{a.dias || '-'}</td>
                                                                    <td className="p-3">
                                                                        <input type="text" placeholder="%" className="w-full text-center p-1 border border-[#cdd7e0] rounded bg-white/50 font-semibold focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.porcentaje} onChange={e => handleAmparoField(a.id, 'porcentaje', e.target.value)} />
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <div className="relative flex items-center">
                                                                            <span className={`absolute left-2 text-[#5c7792] font-bold text-sm pointer-events-none ${!a.activo && 'opacity-50'}`}>$</span>
                                                                            <input type="text" className="w-full pl-6 text-right p-1 border border-[#cdd7e0] rounded bg-white/50 font-medium focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.valorAseguradoStr !== undefined ? a.valorAseguradoStr : (a.valorAsegurado ? a.valorAsegurado.toLocaleString('es-CO',{minimumFractionDigits:0, maximumFractionDigits:2}) : '')} onChange={e => handleAmparoField(a.id, 'valorAsegurado', e.target.value)} />
                                                                        </div>
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <input type="text" className="w-full text-center p-1 border border-[#cdd7e0] rounded bg-white/50 font-semibold focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.tasa} onChange={e => handleAmparoField(a.id, 'tasa', e.target.value)} />
                                                                    </td>
                                                                    <td className="p-3 text-right font-bold text-[#163f73]">{formatCurrency(a.prima)}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className={sectionCls}>
                                                    <h3 className="font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2">Ajustes Adicionales</h3>
                                                    <div className="space-y-4">
                                                        <div>
                                                            <label className={labelCls}>Gastos Cumplimiento</label>
                                                            <div className="relative">
                                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                                                <input type="text" className={`${inputCls} pl-8`} value={costos.gastosCump?costos.gastosCump.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosCump: parseCurrency(e.target.value)})} />
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className={labelCls}>Gastos RCE</label>
                                                            <div className="relative">
                                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                                                <input type="text" className={`${inputCls} pl-8`} value={costos.gastosRCE?costos.gastosRCE.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosRCE: parseCurrency(e.target.value)})} />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-[#12334F] rounded-xl p-6 shadow-lg border border-[#163f73] text-white">
                                                    <h3 className="font-bold text-[#58C9E8] mb-4">Liquidación Final</h3>
                                                    <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                                        <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1 text-sm">Póliza de Cumplimiento</h4>
                                                        <div className="space-y-1 text-sm text-gray-300">
                                                            <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaCumplimiento)}</span></div>
                                                            <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosCump)}</span></div>
                                                            <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaCump)}</span></div>
                                                            <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                                                <span>Total Cumplimiento:</span> <span>{formatCurrency(totalCump)}</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                                        <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1 text-sm">Póliza de Responsabilidad Civil (RCE)</h4>
                                                        <div className="space-y-1 text-sm text-gray-300">
                                                            <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaRCE)}</span></div>
                                                            <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosRCE)}</span></div>
                                                            <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaRCE)}</span></div>
                                                            <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                                                <span>Total RCE:</span> <span>{formatCurrency(totalRCE)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* FASE 3: ENTREGA DE PÓLIZA (Para Directores en estados avanzados) */}
                                    {(isDirector && ['En Trámite', 'Emitida', 'Emitida-Entregada', 'Finalizada'].includes(estadoSolicitud)) && (
                                        <div className="space-y-6 mt-8 border-t-4 border-green-500 pt-8 max-w-[1600px] mx-auto">
                                            <div className="bg-green-50 text-green-800 px-6 py-4 rounded-xl border border-green-200 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                                <div>
                                                    <h3 className="font-bold text-lg flex items-center gap-2"><CheckCircle size={20}/> 4. Entrega de Póliza Final al Cliente</h3>
                                                    <p className="text-sm opacity-80">La Orden de Servicio ya fue emitida. Diligencie los datos de la póliza y cargue el PDF definitivo para alimentar el Dashboard de Producción.</p>
                                                </div>
                                            </div>

                                            <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-200">
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                                    <div>
                                                        <label className={labelCls}># de Póliza - Anexo *</label>
                                                        <input type="text" className={inputCls} placeholder="Ej: 123456 - 0" value={numeroPoliza} onChange={e => setNumeroPoliza(e.target.value)} />
                                                    </div>
                                                    <div>
                                                        <label className={labelCls}>Aseguradora *</label>
                                                        <input type="text" list="lista-aseguradoras" className={inputCls} placeholder="Seleccione o escriba..." value={aseguradora} onChange={e => setAseguradora(e.target.value)} />
                                                        <datalist id="lista-aseguradoras">
                                                            {listaAseguradoras.map(a => <option key={a} value={a} />)}
                                                        </datalist>
                                                    </div>
                                                    
                                                    <div>
                                                    <label className={labelCls}>Ramo Principal *</label>
                                                    <select className={`${inputCls} bg-white`} value={ramoPoliza} onChange={e => setRamoPoliza(e.target.value)}>
                                                        <option value="">SELECCIONE UN RAMO...</option>
                                                        <option value="CUMPLIMIENTO ESTATALES">CUMPLIMIENTO ESTATALES</option>
                                                        <option value="CUMPLIMIENTO PARTICULARES">CUMPLIMIENTO PARTICULARES</option>
                                                        <option value="DISPOSICIÓN LEGAL">DISPOSICIÓN LEGAL</option>
                                                        <option value="RESPONSABILIDAD CIVIL">RESPONSABILIDAD CIVIL</option>
                                                        <option value="SERIEDAD DE LA OFERTA">SERIEDAD DE LA OFERTA</option>
                                                    </select>
                                                </div>
                                                      </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-dashed border-gray-200">
                                                    <div>
                                                        <label className={labelCls}>Observaciones / Notas para el cliente</label>
                                                        <textarea 
                                                            className={`${inputCls} h-32`} 
                                                            placeholder="Escriba aquí los detalles, recomendaciones o saludos que irán en el correo de entrega..."
                                                            value={observacionesPoliza} 
                                                            onChange={e => setObservacionesPoliza(e.target.value)}
                                                        ></textarea>
                                                    </div>
                                                    <div className="bg-gray-50 p-6 rounded-lg border border-dashed border-gray-300 flex flex-col items-center justify-center text-center">
                                                        <UploadCloud size={40} className="text-[#58C9E8] mb-3" />
                                                        <label className="cursor-pointer bg-[#163f73] text-white px-6 py-2.5 rounded-md font-bold text-sm hover:bg-[#12334F] transition-colors mb-2 shadow-sm">
                                                            Seleccionar Póliza (PDF)
                                                            <input type="file" className="hidden" accept=".pdf" onChange={(e) => {
                                                                const files = Array.from(e.target.files);
                                                                const totalSize = files.reduce((acc, file) => acc + file.size, 0);
                                                                if (totalSize > 50 * 1024 * 1024) {
                                                                    showAlert('Límite Excedido', '⚠️ El archivo de la póliza supera los 50MB permitidos.');
                                                                    e.target.value = '';
                                                                    return;
                                                                }
                                                                setArchivosPoliza(files);
                                                            }} />
                                                        </label>
                                                        <span className="text-xs text-gray-500 font-bold">
                                                            {archivosPoliza.length === 0 ? "Ningún archivo seleccionado" : `✅ ${archivosPoliza[0].name} cargado.`}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                </div>

                                {/* FOOTER ACTION BUTTONS */}
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 bg-[#12334F] p-8 rounded-3xl text-white shadow-2xl relative overflow-hidden mt-8 max-w-[1600px] mx-auto">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-[#58C9E8] opacity-10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                                    
                                    <div className="z-10 text-center md:text-left">
                                        {isDirector ? (
                                            <>
                                                <p className="text-[10px] text-[#58C9E8] font-black tracking-widest uppercase mb-1">Gran Total Liquidado (IVA Inc.)</p>
                                                <h2 className="text-3xl md:text-4xl font-black">{formatCurrency(totalGeneral)}</h2>
                                            </>
                                        ) : (
                                            <>
                                                <p className="text-[10px] text-[#58C9E8] font-black tracking-widest uppercase mb-1">Fase 1 Completada</p>
                                                <h2 className="text-2xl md:text-3xl font-bold">Datos listos para enviar</h2>
                                            </>
                                        )}
                                    </div>

                                    <div className="flex flex-wrap justify-center gap-3 z-10">
                                        <button onClick={limpiarFormularioCotizador} className="px-4 py-3 bg-white/10 hover:bg-red-500/80 text-white rounded-xl font-bold transition-all" title="Limpiar todo"><Trash2 size={18} /></button>
                                        
                                        {isDirector && (
                                            <>
                                                <button onClick={exportarCotizacion} className="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-xl font-bold flex items-center gap-2 transition-all border border-white/20"><FileText size={18} className="hidden sm:block"/> RESUMEN</button>
                                                <button onClick={imprimirCotizacion} className="px-5 py-3 bg-[#e8f7fb] text-[#163f73] hover:bg-[#d0f0fa] rounded-xl font-bold flex items-center gap-2 border border-[#58C9E8]"><Printer size={18} className="hidden sm:block"/> PDF</button>
                                            </>
                                        )}

                                        {isDirector ? (
                                            ['En Trámite', 'Emitida'].includes(estadoSolicitud) ? (
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    <button onClick={enviarOrdenFinal} disabled={isSubmitting} className="px-4 py-3 bg-[#163f73] text-white hover:bg-[#0e273d] rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all border border-[#58C9E8]/30" title="Reenviar Orden Final a Make">
                                                        <RefreshCw size={18}/>
                                                    </button>
                                                    <button onClick={enviarPolizaFinal} disabled={isSubmitting} className="px-6 md:px-8 py-3 bg-green-500 text-white hover:bg-green-600 rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all">
                                                        {isSubmitting ? "ENVIANDO PÓLIZA..." : <><Send size={18}/> ENVIAR PÓLIZA A CLIENTE</>}
                                                    </button>
                                                </div>
                                            ) : ['Finalizada', 'Emitida-Entregada'].includes(estadoSolicitud) ? (
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    <button onClick={enviarPolizaFinal} disabled={isSubmitting} className="px-6 md:px-8 py-3 bg-green-600 text-white hover:bg-green-700 rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all border border-green-400">
                                                        {isSubmitting ? "REENVIANDO PÓLIZA..." : <><RefreshCw size={18}/> REENVIAR PÓLIZA (CORRECCIÓN)</>}
                                                    </button>
                                                </div>
                                            ) : (
                                                <button onClick={enviarOrdenFinal} disabled={isSubmitting} className="px-6 md:px-8 py-3 bg-[#58C9E8] text-[#12334F] hover:bg-[#4dbddb] rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all">
                                                    {isSubmitting ? "PROCESANDO..." : <><Send size={18}/> GENERAR ORDEN FINAL</>}
                                                </button>
                                            )
                                        ) : (
                                            <button onClick={confirmarGuardarPreOrden} disabled={isSubmitting || isLoadingNube} className="px-6 md:px-8 py-3 bg-[#58C9E8] text-[#12334F] hover:bg-[#4dbddb] rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all">
                                                {isSubmitting ? "GUARDANDO..." : <><Cloud size={18}/> GUARDAR PRE-ORDEN</>}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 4: MIS SOLICITUDES (CONECTADA A LA NUBE)            */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'solicitudes' ? 'block p-4 md:p-8 pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm rounded-xl flex items-center gap-3 mb-6 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-[#58C9E8] opacity-10 rounded-full -translate-y-1/2 translate-x-1/4"></div>
                                    <div className="p-2 bg-white/10 rounded-lg z-10"><FileText size={32} className="text-[#58C9E8]" /></div>
                                    <div className="z-10">
                                        <h1 className="text-2xl font-bold tracking-wide">Mis Solicitudes</h1>
                                        <p className="text-[#58C9E8] text-sm font-medium uppercase tracking-wider">HISTORIAL DE TRÁMITES Y ÓRDENES</p>
                                    </div>
                                </div>

                                <div className="w-full max-w-[1600px] mx-auto">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/80 flex justify-between items-center">
                                            <h4 className="text-lg font-bold text-[#163f73] flex items-center gap-2"><Cloud size={20} className="text-[#58C9E8]"/> Base de Datos en Tiempo Real</h4>
                                            <span className="text-xs font-bold bg-[#e8f7fb] text-[#163f73] px-3 py-1 rounded-full border border-[#58C9E8]/30">Mostrando {solicitudesFiltradas.length} registros</span>
                                        </div>
                                        <div className="overflow-x-auto min-h-[400px]">
                                            <table className="w-full text-left border-collapse min-w-[1200px]">
                                                <thead className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
                                                    <tr className="text-gray-500 text-xs uppercase tracking-wider">
                                                        <th className="px-4 py-4 font-semibold w-40">
                                                            <div className="flex flex-col gap-2">
                                                                <span>ID Solicitud</span>
                                                                <div className="relative">
                                                                    <Search size={14} className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"/>
                                                                    <input type="text" placeholder="Filtrar ID" className="w-full pl-7 pr-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-[#58C9E8] font-normal normal-case text-gray-700" value={filtrosSolicitudes.consecutivo} onChange={(e) => handleFiltroChange(e, 'consecutivo')} />
                                                                </div>
                                                            </div>
                                                        </th>
                                                        <th className="px-4 py-4 font-semibold w-40">
                                                            <div className="flex flex-col gap-2">
                                                                <span>Fecha Radicación</span>
                                                                <input type="date" className="w-full px-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-[#58C9E8] font-normal normal-case text-gray-700" value={filtrosSolicitudes.fecha} onChange={(e) => handleFiltroChange(e, 'fecha')} />
                                                            </div>
                                                        </th>
                                                        <th className="px-4 py-4 font-semibold w-56">
                                                            <div className="flex flex-col gap-2">
                                                                <span>Tomador / Empresa</span>
                                                                <div className="relative">
                                                                    <Search size={14} className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"/>
                                                                    <input type="text" placeholder="Buscar tomador..." className="w-full pl-7 pr-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-[#58C9E8] font-normal normal-case text-gray-700" value={filtrosSolicitudes.tomador} onChange={(e) => handleFiltroChange(e, 'tomador')} />
                                                                </div>
                                                            </div>
                                                        </th>
                                                        <th className="px-4 py-4 font-semibold w-48">
                                                            <div className="flex flex-col gap-2">
                                                                <span>Solicitante</span>
                                                                <div className="relative">
                                                                    <Search size={14} className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"/>
                                                                    <input type="text" placeholder="Buscar solicitante..." className="w-full pl-7 pr-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-[#58C9E8] font-normal normal-case text-gray-700" value={filtrosSolicitudes.solicitante} onChange={(e) => handleFiltroChange(e, 'solicitante')} />
                                                                </div>
                                                            </div>
                                                        </th>
                                                        <th className="px-4 py-4 font-semibold w-40">
                                                            <div className="flex flex-col gap-2">
                                                                <span>Valor Contrato (≥)</span>
                                                                <div className="relative">
                                                                    <span className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                                                                    <input type="text" placeholder="Ej: 1000000" className="w-full pl-6 pr-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-[#58C9E8] font-normal normal-case text-gray-700" value={filtrosSolicitudes.valor} onChange={(e) => {
                                                                        const val = e.target.value.replace(/\D/g, '');
                                                                        setFiltrosSolicitudes(prev => ({...prev, valor: val ? parseInt(val).toLocaleString('es-CO') : ''}));
                                                                    }} />
                                                                </div>
                                                            </div>
                                                        </th>
                                                        <th className="px-4 py-4 font-semibold text-center w-40">
                                                            <div className="flex flex-col gap-2">
                                                                <span>Estado</span>
                                                                <select className="w-full px-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-[#58C9E8] font-normal normal-case text-gray-700 bg-white" value={filtrosSolicitudes.estado} onChange={(e) => handleFiltroChange(e, 'estado')}>
                                                                    <option value="">Todos los estados</option>
                                                                    <option value="Pre-Orden">Pre-Orden</option>
                                                                    <option value="En Trámite">En Trámite</option>
                                                                    <option value="Emitida-Entregada">Emitida-Entregada</option>
                                                                </select>
                                                            </div>
                                                        </th>
                                                        <th className="px-4 py-4 font-semibold text-center w-32 align-top">
                                                            <div className="mt-1">Acciones</div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 text-sm">
                                                    {solicitudesFiltradas.length === 0 ? (
                                                        <tr>
                                                            <td colSpan="7" className="px-6 py-12 text-center text-gray-500">
                                                                <Cloud size={40} className="mx-auto text-gray-300 mb-3" />
                                                                <p>No se encontraron solicitudes que coincidan con los filtros de búsqueda.</p>
                                                                <button onClick={() => setFiltrosSolicitudes({consecutivo: '', fecha: '', tomador: '', solicitante: '', valor: '', estado: ''})} className="mt-4 text-[#58C9E8] font-bold hover:underline">Limpiar Filtros</button>
                                                            </td>
                                                        </tr>
                                                    ) : solicitudesFiltradas.map((sol, i) => (
                                                        <tr key={i} className="hover:bg-blue-50/30 transition-colors">
                                                            <td className="px-4 py-4 font-bold text-[#12334F] text-xs">{sol.consecutivo}</td>
                                                            <td className="px-4 py-4 text-gray-600 text-xs">
                                                                {sol.fechaRegistro ? new Date(sol.fechaRegistro).toLocaleDateString('es-CO') : 'N/A'} 
                                                                <span className="text-[10px] text-gray-400 block">
                                                                    {sol.fechaRegistro ? new Date(sol.fechaRegistro).toLocaleTimeString('es-CO', {hour: '2-digit', minute:'2-digit'}) : ''}
                                                                </span>
                                                            </td>
                                                            <td className="px-4 py-4 text-[#12334F] font-medium truncate max-w-[200px]" title={sol.tomadorNombre}>
                                                                {sol.tomadorNombre || 'N/A'}
                                                            </td>
                                                            <td className="px-4 py-4 text-gray-600 truncate max-w-[180px]" title={sol.solicitanteNombre}>
                                                                {sol.solicitanteNombre || 'N/A'}
                                                            </td>
                                                            <td className="px-4 py-4 font-bold text-[#163f73]">
                                                                {sol.valorConIva ? formatCurrency(sol.valorConIva) : '$ 0'}
                                                            </td>
                                                            <td className="px-4 py-4 text-center">
                                                                <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold border ${(sol.estado === 'Finalizada' || sol.estado === 'Emitida-Entregada') ? 'bg-green-50 text-green-700 border-green-200' : (sol.estado === 'Emitida' || sol.estado === 'En Trámite') ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>
                                                                    {(sol.estado === 'Finalizada' || sol.estado === 'Emitida-Entregada') ? <CheckCircle size={12}/> : (sol.estado === 'Emitida' || sol.estado === 'En Trámite') ? <Award size={12}/> : <ClockIcon size={12}/>}
                                                                    {sol.estado || 'Pre-Orden'}
                                                                </span>
                                                            </td>
                                                            <td className="px-4 py-4 text-center flex justify-center gap-2">
                                                                <button onClick={() => abrirSolicitud(sol.consecutivo)} className="px-3 py-2 bg-white text-[#163f73] hover:bg-[#163f73] hover:text-white rounded-lg font-bold text-[10px] uppercase tracking-wider transition-colors border border-[#cdd7e0] shadow-sm flex items-center gap-1" title="Abrir para revisar o reenviar datos">
                                                                    Abrir &rarr;
                                                                </button>
                                                                {isDirectorUnlocked && (
                                                                    <button onClick={() => eliminarSolicitud(sol.consecutivo)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-200" title="Eliminar registro de Firebase">
                                                                        <Trash2 size={16}/>
                                                                    </button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 2: REPORTE PRODUCCIÓN                               */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'produccion' ? 'block p-4 md:p-8 pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm mb-6 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white/10 rounded-lg"><TrendingUp size={32} className="text-[#58C9E8]" strokeWidth={2} /></div>
                                        <div><h1 className="text-2xl font-bold tracking-wide">Reporte de Producción y ANS</h1><p className="text-[#58C9E8] text-sm font-medium">MÉTRICAS OPERATIVAS</p></div>
                                    </div>
                                </div>

                                <div className="w-full max-w-[1600px] mx-auto space-y-8">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div>
                                            <h3 className="text-lg font-bold text-[#163f73] flex items-center gap-2"><UploadCloud size={20} className="text-[#58C9E8]"/> Actualizar Datos del Reporte</h3>
                                            <p className="text-sm text-gray-500">Carga un archivo CSV para actualizar las gráficas en tiempo real.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            <button onClick={() => downloadTemplate('produccion')} className="px-4 py-2.5 text-sm font-medium text-[#163f73] bg-[#e8f7fb] rounded-lg border border-[#58C9E8]/30 hover:bg-[#d0f0fa] flex items-center gap-2"><Download size={16} /> Plantilla CSV</button>
                                            <label className="cursor-pointer px-4 py-2.5 text-sm font-medium text-white bg-[#163f73] rounded-lg hover:bg-[#12334F] flex items-center gap-2"><FileText size={16} /> Cargar Archivo<input type="file" accept=".csv" className="hidden" onChange={(e) => handleCsvUpload(e, 'produccion')} /></label>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-blue-50 rounded-lg text-[#163f73]"><FileText size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Total Solicitudes</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{prodTotal}</h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-[#e8f7fb] rounded-lg text-[#58C9E8]"><CheckCircle size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Entregas &lt; 24 Horas</p><h4 className="text-3xl font-bold text-[#163f73] mt-1">{prodMenorUnDia} <span className="text-lg text-gray-500 font-normal">({prodPorcentaje}%)</span></h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-indigo-50 rounded-lg text-indigo-600"><ClockIcon size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Mediana ANS</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{prodMediana} <span className="text-lg text-gray-500 font-normal">hrs</span></h4></div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mt-8">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                                            <h4 className="text-lg font-bold text-[#163f73]">Resumen Consolidado por Cliente</h4>
                                            <span className="text-xs font-medium px-2 py-1 bg-[#163f73] text-white rounded-md shadow-sm">Totales Globales</span>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                            <thead className="bg-gray-50 shadow-sm border-b border-gray-200">
                                                <tr className="text-gray-500 text-xs uppercase tracking-wider">
                                                <th className="px-6 py-4 font-semibold">Cliente / Tomador</th>
                                                <th className="px-6 py-4 font-semibold text-center">Total Pólizas</th>
                                                <th className="px-6 py-4 font-semibold text-right">Prima Total Emitida</th>
                                                <th className="px-6 py-4 font-semibold text-center">% de Participación</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 text-sm">
                                                {prodSummaryArray.map((item, idx) => {
                                                    const porcentaje = prodTotalValor > 0 ? ((item.totalValor / prodTotalValor) * 100).toFixed(1) : 0;
                                                    return (
                                                        <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                            <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{item.cliente}</div></td>
                                                            <td className="px-6 py-4 text-center"><span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-[#e8f7fb] text-[#163f73] font-bold">{item.count}</span></td>
                                                            <td className="px-6 py-4 text-right"><span className="font-bold text-[#12334F] text-base">{formatCurrency(item.totalValor)}</span></td>
                                                            <td className="px-6 py-4 text-center">
                                                                <div className="w-full bg-gray-200 rounded-full h-2 mt-1">
                                                                    <div className="bg-[#58C9E8] h-2 rounded-full" style={{ width: `${porcentaje}%` }}></div>
                                                                </div>
                                                                <span className="text-xs text-gray-500 font-semibold mt-1 inline-block">{porcentaje}%</span>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                            <tfoot className="bg-gray-100 font-bold border-t-2 border-gray-200 text-[#12334F]">
                                                <tr>
                                                    <td className="px-6 py-4 text-right uppercase">Total General:</td>
                                                    <td className="px-6 py-4 text-center text-lg">{prodTotal}</td>
                                                    <td className="px-6 py-4 text-right text-lg">{formatCurrency(prodTotalValor)}</td>
                                                    <td className="px-6 py-4 text-center text-lg">100%</td>
                                                </tr>
                                            </tfoot>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="px-6 py-5 border-b bg-gray-50/50 font-bold text-[#163f73]">Registro Detallado</div>
                                        <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                                            <table className="w-full text-left border-collapse min-w-[900px]">
                                                <thead className="sticky top-0 bg-gray-50 z-10 shadow-sm text-gray-500 text-xs uppercase tracking-wider">
                                                    <tr><th className="px-6 py-4 font-semibold">Cliente</th><th className="px-6 py-4 font-semibold">Asegurado / Póliza</th><th className="px-6 py-4 font-semibold">Aseguradora / Ramo</th><th className="px-6 py-4 font-semibold text-center">Tiempo ANS</th><th className="px-6 py-4 font-semibold">Estado</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 text-sm">
                                                    {produccionData.map((policy, idx) => {
