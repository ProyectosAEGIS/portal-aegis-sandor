<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal y Reportes - AEGIS Insurance</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Librería para la generación de PDF silenciosa -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Estilos para evitar fatiga visual - Tonalidades Suaves */
        .soft-input {
            background-color: #eef3f8;
            border: 1px solid #cdd7e0;
            transition: all 0.2s;
        }
        .soft-input:focus {
            background-color: #ffffff !important;
            border-color: #58C9E8;
            box-shadow: 0 0 0 3px rgba(88, 201, 232, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="bg-[#e6edf3] font-sans text-[#12334F] overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. ÍCONOS SVG
        // ==========================================
        const Shield = ({size=24, className="", strokeWidth=2}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const Calculator = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16.01" y2="14"/><line x1="16" y1="10" x2="16.01" y2="10"/><line x1="16" y1="18" x2="16.01" y2="18"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="12" y1="10" x2="12.01" y2="10"/><line x1="12" y1="18" x2="12.01" y2="18"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="8" y1="10" x2="8.01" y2="10"/><line x1="8" y1="18" x2="8.01" y2="18"/></svg>;
        const User = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const Building = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;
        const FileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        const Save = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const Printer = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const Trash2 = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Send = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        const Paperclip = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>;
        const Home = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const Bell = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
        const MenuIcon = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const TrendingUp = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const PieChart = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
        const LifeBuoy = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="14.83" y1="9.17" x2="18.36" y2="5.64"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>;

        // ==========================================
        // 2. CONFIGURACIÓN Y FUNCIONES AUXILIARES
        // ==========================================
        const WEBHOOK_URL = "https://hook.us2.make.com/6oy0xm0wdgimjdyb39wnxuxlbs2wunlw"; 

        const AMPAROS_BASE = [
            { id: 1, nombre: 'Seriedad de la Oferta', tasaDefault: 0.10 },
            { id: 2, nombre: 'Cumplimiento', tasaDefault: 0.18 },
            { id: 3, nombre: 'Buen Manejo del Anticipo', tasaDefault: 0.18 },
            { id: 4, nombre: 'Pagos de Salarios y Prestaciones', tasaDefault: 0.15 },
            { id: 5, nombre: 'Calidad del Servicio', tasaDefault: 0.18 },
            { id: 6, nombre: 'Calidad de los Bienes', tasaDefault: 0.18 },
            { id: 7, nombre: 'Estabilidad y Calidad', tasaDefault: 0.18 },
            { id: 8, nombre: 'Calidad y Correcto Funcionamiento', tasaDefault: 0.18 },
            { id: 9, nombre: 'Responsabilidad Civil Extracontractual', tasaDefault: 0.20 }
        ];

        function formatCurrency(amount) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(amount || 0);
        }

        function parseCurrency(val) {
            return parseInt(String(val).replace(/\D/g, ''), 10) || 0;
        }

        // ==========================================
        // 3. COMPONENTE PRINCIPAL
        // ==========================================
        function App() {
            const [activeMenu, setActiveMenu] = React.useState('cotizador');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [consecutivo, setConsecutivo] = React.useState('');
            
            // Estados del Formulario
            const [interno, setInterno] = React.useState({ solicitante: '', solicitanteEmail: '', asunto: '', tipos: { garantiaUnica: false, cumplimientoParticulares: false, cumplimientoEstatales: false, disposicionLegal: false, otros: false }, archivos: [] });
            const [tomador, setTomador] = React.useState({ nombre: '', nit: '', direccion: '', telefono: '', email: '', celular: '' });
            const [asegurado, setAsegurado] = React.useState({ nombre: '', nit: '' });
            const [contrato, setContrato] = React.useState({ objeto: '', numero: '', valorConIva: 0, desde: '', hasta: '', duracion: '' });
            const [costos, setCostos] = React.useState({ gastosCump: 5000, gastosRCE: 5000, tasaIva: 19 });
            const [amparos, setAmparos] = React.useState(AMPAROS_BASE.map(a => ({ ...a, activo: false, desde: '', hasta: '', dias: 0, porcentaje: '', valorAsegurado: 0, valorAseguradoStr: '', tasa: a.tasaDefault.toFixed(2), prima: 0 })));
            const [isSubmitting, setIsSubmitting] = React.useState(false);

            // Generador de Consecutivo
            const generarConsecutivoLocal = () => {
                const ahora = new Date();
                const yy = String(ahora.getFullYear()).slice(-2);
                const mm = String(ahora.getMonth() + 1).padStart(2, '0');
                const dd = String(ahora.getDate()).padStart(2, '0');
                const hh = String(ahora.getHours()).padStart(2, '0');
                const min = String(ahora.getMinutes()).padStart(2, '0');
                const ss = String(ahora.getSeconds()).padStart(2, '0');
                return `SANDOR-COT-${yy}${mm}${dd}${hh}${min}${ss}`;
            };

            React.useEffect(() => { setConsecutivo(generarConsecutivoLocal()); }, []);

            // Cálculos Financieros
            const valorConIva = contrato.valorConIva || 0;
            const valorSinIva = valorConIva / (1 + (costos.tasaIva / 100));
            
            const amparosCumplimiento = amparos.slice(0, 8);
            const tieneCumplimiento = amparosCumplimiento.some(a => a.activo);
            const primaCumplimiento = amparosCumplimiento.reduce((acc, curr) => curr.activo ? acc + curr.prima : acc, 0);
            const gastosCalculadosCump = tieneCumplimiento ? costos.gastosCump : 0;
            const subtotalCump = primaCumplimiento + gastosCalculadosCump;
            const ivaCump = subtotalCump * (costos.tasaIva / 100);
            const totalCump = subtotalCump + ivaCump;

            const amparoRCE = amparos[8];
            const tieneRCE = amparoRCE.activo;
            const primaRCE = tieneRCE ? amparoRCE.prima : 0;
            const gastosCalculadosRCE = tieneRCE ? costos.gastosRCE : 0;
            const subtotalRCE = primaRCE + gastosCalculadosRCE;
            const ivaRCE = subtotalRCE * (costos.tasaIva / 100);
            const totalRCE = subtotalRCE + ivaRCE;
            const totalGeneral = totalCump + totalRCE;

            // --- GENERACIÓN DE ESTRUCTURA HTML PARA PDF ---
            const getOrdenServicioHTML = () => {
                const amparosHtml = amparos.filter(a => a.activo).map(a => `
                    <tr>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; font-size: 13px;">${a.nombre}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; font-size: 13px;">${a.desde || '-'} al ${a.hasta || '-'}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px;">${a.dias}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px;">${a.porcentaje || '0'}%</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: right; font-size: 13px;">${formatCurrency(a.valorAsegurado)}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px;">${a.tasa}%</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: right; font-size: 13px; font-weight: bold; color:#163f73;">${formatCurrency(a.prima)}</td>
                    </tr>
                `).join('');

                return `
                    <div id="pdf-content" style="font-family: 'Arial', sans-serif; color: #12334F; padding: 20px; background: white;">
                        <style>
                            table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                            td, th { padding: 6px 0; vertical-align: top; font-size: 14px; }
                            .label { font-weight: bold; width: 35%; color: #555; }
                            .val { width: 65%; }
                            .amparos-table th { background-color: #f4f7f9; padding: 12px 10px; text-align: left; font-size: 12px; color: #163f73; text-transform: uppercase; }
                            .totals-container { width: 50%; margin-left: auto; margin-top: 20px; }
                            .totals-box { background-color: #f4f7f9; border-left: 4px solid #163f73; padding: 15px; margin-bottom: 10px; }
                            .totals-box h4 { margin: 0 0 10px 0; color: #163f73; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
                            .totals-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: #333; }
                            .totals-subtotal { display: flex; justify-content: space-between; font-weight: bold; color: #163f73; font-size: 14px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ccc; }
                            .grand-total-box { background-color: #12334F; border-left: 5px solid #58C9E8; padding: 15px; color: white; margin-top: 15px; }
                            .grand-total-box .totals-row { color: white; font-size: 18px; font-weight: bold; margin: 0; }
                            .section-title { color: #163f73; font-size: 16px; border-bottom: 1px solid #e0e0e0; padding-bottom: 5px; margin-top: 30px; margin-bottom: 15px; text-transform: uppercase; }
                        </style>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #58C9E8; padding-bottom: 20px; margin-bottom: 30px;">
                            <div>
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#58C9E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 5px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                <h1 style="margin: 0; color: #163f73; font-size: 28px; text-transform: uppercase; letter-spacing: 1px;">AEGIS</h1>
                                <p style="margin: 2px 0 0 0; color: #58C9E8; font-weight: bold; letter-spacing: 3px; font-size: 11px; text-transform: uppercase;">INSURANCE</p>
                            </div>
                            <div style="text-align: right;">
                                <h2 style="margin:0; color: #163f73; font-size: 20px;">ORDEN DE SERVICIO</h2>
                                <p style="margin:5px 0 0 0; color: #555; font-size:14px; font-weight: normal;">No. <b>${consecutivo}</b></p>
                                <p style="margin:5px 0 0 0; color: #555; font-size:12px; font-weight: normal;">Fecha: ${new Date().toLocaleDateString('es-CO')}</p>
                            </div>
                        </div>

                        <div style="display: flex; gap: 40px;">
                            <div style="flex: 1;">
                                <h3 class="section-title">Datos del Tomador</h3>
                                <table>
                                    <tr><td class="label">Razón Social:</td><td class="val">${tomador.nombre}</td></tr>
                                    <tr><td class="label">NIT:</td><td class="val">${tomador.nit}</td></tr>
                                    <tr><td class="label">Dirección:</td><td class="val">${tomador.direccion || '-'}</td></tr>
                                    <tr><td class="label">Email / Tel:</td><td class="val">${tomador.email || '-'} / ${tomador.telefono || tomador.celular || '-'}</td></tr>
                                </table>
                            </div>
                            <div style="flex: 1;">
                                <h3 class="section-title">Datos del Asegurado</h3>
                                <table>
                                    <tr><td class="label">Razón Social:</td><td class="val">${asegurado.nombre}</td></tr>
                                    <tr><td class="label">NIT:</td><td class="val">${asegurado.nit}</td></tr>
                                    <tr><td class="label">Solicitante:</td><td class="val">${interno.solicitante}</td></tr>
                                    <tr><td class="label">Asunto:</td><td class="val">${interno.asunto || '-'}</td></tr>
                                </table>
                            </div>
                        </div>

                        <h3 class="section-title">Datos del Contrato</h3>
                        <table>
                            <tr><td class="label" style="width:20%;">Objeto:</td><td class="val" style="width:80%; text-align: justify;">${contrato.objeto}</td></tr>
                            <tr><td class="label" style="width:20%;">No. Contrato:</td><td class="val" style="width:80%;">${contrato.numero || '-'}</td></tr>
                            <tr><td class="label" style="width:20%;">Vigencia:</td><td class="val" style="width:80%;">${contrato.desde || '-'} al ${contrato.hasta || '-'} (${contrato.duracion || '-'} días)</td></tr>
                            <tr><td class="label" style="width:20%;">Valor SIN IVA:</td><td class="val" style="width:80%;">${formatCurrency(valorSinIva)}</td></tr>
                            <tr><td class="label" style="width:20%;">Valor CON IVA:</td><td class="val" style="width:80%;">${formatCurrency(valorConIva)}</td></tr>
                        </table>

                        <h3 class="section-title">Amparos Solicitados</h3>
                        <table class="amparos-table">
                            <thead>
                                <tr>
                                    <th>Amparo</th>
                                    <th>Vigencia</th>
                                    <th style="text-align: center;">Días</th>
                                    <th style="text-align: center;">% Vr. Aseg.</th>
                                    <th style="text-align: right;">V. Asegurado</th>
                                    <th style="text-align: center;">Tasa</th>
                                    <th style="text-align: right;">Prima</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${amparosHtml || '<tr><td colspan="7" style="text-align:center; padding: 20px;">No se seleccionaron amparos.</td></tr>'}
                            </tbody>
                        </table>

                        <div class="totals-container">
                            <div class="totals-box">
                                <h4>Póliza de Cumplimiento</h4>
                                <div class="totals-row"><span>Prima:</span><span>${formatCurrency(primaCumplimiento)}</span></div>
                                <div class="totals-row"><span>Gastos de Expedición:</span><span>${formatCurrency(gastosCalculadosCump)}</span></div>
                                <div class="totals-row"><span>IVA (${costos.tasaIva}%):</span><span>${formatCurrency(ivaCump)}</span></div>
                                <div class="totals-subtotal"><span>Total Cumplimiento:</span><span>${formatCurrency(totalCump)}</span></div>
                            </div>

                            <div class="totals-box">
                                <h4>Póliza de Responsabilidad Civil (RCE)</h4>
                                <div class="totals-row"><span>Prima:</span><span>${formatCurrency(primaRCE)}</span></div>
                                <div class="totals-row"><span>Gastos de Expedición:</span><span>${formatCurrency(gastosCalculadosRCE)}</span></div>
                                <div class="totals-row"><span>IVA (${costos.tasaIva}%):</span><span>${formatCurrency(ivaRCE)}</span></div>
                                <div class="totals-subtotal"><span>Total RCE:</span><span>${formatCurrency(totalRCE)}</span></div>
                            </div>

                            <div class="grand-total-box">
                                <div class="totals-row">
                                    <span>GRAN TOTAL A PAGAR:</span>
                                    <span>${formatCurrency(totalGeneral)}</span>
                                </div>
                            </div>
                        </div>

                        <div style="margin-top: 50px; text-align: center; font-size: 11px; color: #888; border-top: 1px solid #eee; padding-top: 20px;">
                            <strong>AEGIS INSURANCE - PROTECCIÓN & RESPALDO</strong><br>
                            Documento generado automáticamente a través del Portal de Servicios. Operación exclusiva para Grupo Elite / Sandor.<br>
                        </div>
                    </div>
                `;
            };

            // --- MANEJADORES DE EVENTOS ---
            const handleAmparoToggle = (id) => {
                setAmparos(prev => prev.map(amp => {
                    if (amp.id === id) {
                        const isActivating = !amp.activo;
                        let newDesde = amp.desde; let newHasta = amp.hasta;
                        if (isActivating && id !== 1 && !newDesde && !newHasta) {
                            const primerAmparo = prev.find(a => a.id === 1);
                            if (primerAmparo && primerAmparo.desde && primerAmparo.hasta) { newDesde = primerAmparo.desde; newHasta = primerAmparo.hasta; }
                        }
                        let newDias = amp.dias;
                        if (newDesde && newHasta) {
                            const diff = Math.ceil((new Date(newHasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24));
                            newDias = diff > 0 ? diff : 0;
                        }
                        return { ...amp, activo: isActivating, desde: newDesde, hasta: newHasta, dias: newDias, porcentaje: isActivating ? amp.porcentaje : '', valorAsegurado: isActivating ? amp.valorAsegurado : 0, valorAseguradoStr: isActivating ? amp.valorAseguradoStr : '', prima: isActivating ? amp.prima : 0 };
                    }
                    return amp;
                }));
            };

            const handleAmparoField = (id, field, value) => {
                setAmparos(prev => prev.map(amp => {
                    if (amp.id === id) {
                        const updated = { ...amp };
                        
                        if (field === 'desde' || field === 'hasta') {
                            updated[field] = value;
                            if (updated.desde && updated.hasta) {
                                const diff = Math.ceil((new Date(updated.hasta) - new Date(updated.desde)) / (1000 * 60 * 60 * 24));
                                updated.dias = diff > 0 ? diff : 0;
                            }
                        }
                        else if (field === 'porcentaje') {
                            updated.porcentaje = value;
                            let cleanPct = value.replace(/[^0-9,.]/g, '').replace(',', '.');
                            let pctNum = parseFloat(cleanPct);
                            
                            if (!isNaN(pctNum)) {
                                let vAseg = valorConIva * (pctNum / 100);
                                updated.valorAsegurado = vAseg;
                                updated.valorAseguradoStr = vAseg.toLocaleString('es-CO', {minimumFractionDigits:0, maximumFractionDigits:2});
                                updated.prima = vAseg * ((parseFloat(updated.tasa) || 0) / 100);
                            } else {
                                updated.valorAsegurado = 0;
                                updated.valorAseguradoStr = '';
                                updated.prima = 0;
                            }
                        }
                        else if (field === 'valorAsegurado') {
                            updated.valorAseguradoStr = value;
                            let cleanVal = value.replace(/\./g, '').replace(',', '.').replace(/[^0-9.]/g, '');
                            let vAseg = parseFloat(cleanVal) || 0;
                            updated.valorAsegurado = vAseg;
                            
                            if (valorConIva > 0 && vAseg > 0) {
                                updated.porcentaje = ((vAseg / valorConIva) * 100).toFixed(2).replace('.', ',');
                            } else {
                                updated.porcentaje = '';
                            }
                            updated.prima = vAseg * ((parseFloat(updated.tasa) || 0) / 100);
                        }
                        else if (field === 'tasa') {
                            updated.tasa = value;
                            updated.prima = updated.valorAsegurado * ((parseFloat(value.replace(',', '.')) || 0) / 100);
                        }
                        
                        return updated;
                    }
                    return amp;
                }));
            };

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                const totalSize = files.reduce((acc, f) => acc + f.size, 0);
                if (totalSize > 8 * 1024 * 1024) alert("⚠️ Atención: Archivos superan los 8MB. Podría haber errores de envío.");
                setInterno(prev => ({ ...prev, archivos: files }));
            };

            const exportarCotizacion = () => {
                const amparosActivos = amparos.filter(a => a.activo);
                let detalle = amparosActivos.map(a => `  - ${a.nombre} | ${a.desde} al ${a.hasta} (${a.dias} d) | V. Asegurado: ${formatCurrency(a.valorAsegurado)} | Prima: ${formatCurrency(a.prima)}`).join('\n');
                let resumen = `📋 SOLICITUD DE COTIZACIÓN - AEGIS\nID: ${consecutivo}\nSolicitante: ${interno.solicitante}\nTomador: ${tomador.nombre}\nObjeto: ${contrato.objeto}\n\n🛡️ AMPAROS:\n${detalle || 'Ninguno'}\n\n💰 TOTAL LIQUIDADO: ${formatCurrency(totalGeneral)}`;
                navigator.clipboard.writeText(resumen).then(() => alert("✅ Resumen copiado al portapapeles."));
            };

            // Imprimir Documento Manualmente
            const imprimirCotizacion = () => {
                const printWindow = window.open('', '_blank');
                const htmlContent = `
                    <!DOCTYPE html>
                    <html lang="es">
                    <head>
                        <meta charset="UTF-8">
                        <title>Orden de Servicio ${consecutivo} - AEGIS</title>
                        <style>
                            @media print { 
                                @page { margin: 10mm; size: landscape; }
                                body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; zoom: 0.85; } 
                            }
                        </style>
                    </head>
                    <body style="margin:0; padding:0;">
                        ${getOrdenServicioHTML()}
                        <script>
                            window.onload = function() { 
                                setTimeout(() => { window.print(); }, 500); 
                            }
                        <\/script>
                    </body>
                    </html>
                `;
                printWindow.document.write(htmlContent);
                printWindow.document.close();
            };

            const getBase64 = (file) => new Promise((res, rej) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = () => res({ name: file.name, contentBytes: r.result.split(',')[1] });
                r.onerror = e => rej(e);
            });

            // Enviar Solicitud a Make.com (INCLUYE GENERACIÓN DE PDF INVISIBLE)
            const enviarAegis = async () => {
                if (!WEBHOOK_URL) return alert("❌ Error: No se ha configurado la URL de Make.com.");
                if (!interno.solicitante || !tomador.nombre) return alert("Diligencie Solicitante y Tomador mínimo.");
                setIsSubmitting(true);
                try {
                    const attachments = await Promise.all(interno.archivos.map(getBase64));
                    
                    // --- Novedad: Generar PDF de Orden de Servicio en Segundo Plano ---
                    try {
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = getOrdenServicioHTML();
                        tempDiv.style.position = 'absolute';
                        tempDiv.style.left = '-9999px';
                        document.body.appendChild(tempDiv);
                        
                        const opt = {
                            margin:       10,
                            filename:     `${consecutivo}_Orden_Servicio.pdf`,
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2, logging: false },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
                        };
                        
                        // Generar el archivo PDF codificado
                        const pdfDataUri = await html2pdf().set(opt).from(tempDiv).outputPdf('datauristring');
                        const pdfBase64 = pdfDataUri.split(',')[1];
                        document.body.removeChild(tempDiv);
                        
                        // Inyectar el PDF generado como un adjunto más
                        if (pdfBase64) {
                            attachments.push({
                                name: `${consecutivo} - Orden de Servicio.pdf`,
                                contentBytes: pdfBase64
                            });
                        }
                    } catch (pdfError) {
                        console.error("Error al generar PDF automático:", pdfError);
                        // No detenemos el proceso si el PDF falla, los demás datos y contratos seguirán su curso
                    }
                    // -------------------------------------------------------------------

                    const amparosDetalleExcel = amparos.filter(a => a.activo).map(a => 
                        `${a.nombre} | Vig: ${a.desde || '-'} a ${a.hasta || '-'} (${a.dias} d) | % Asegurado: ${a.porcentaje||'0'}% | V.Aseg: ${formatCurrency(a.valorAsegurado)} | Tasa: ${a.tasa}% | Prima: ${formatCurrency(a.prima)}`
                    ).join('\n');

                    const payload = {
                        fechaRegistro: new Date().toLocaleString('es-CO'),
                        consecutivo, 
                        solicitanteNombre: interno.solicitante, solicitanteEmail: interno.solicitanteEmail, asunto: interno.asunto,
                        tiposSolicitud: Object.keys(interno.tipos).filter(k => interno.tipos[k]).join(', '),
                        tomadorNombre: tomador.nombre, tomadorNit: tomador.nit, tomadorDireccion: tomador.direccion, tomadorTelefono: tomador.telefono, tomadorEmail: tomador.email,
                        aseguradoNombre: asegurado.nombre, aseguradoNit: asegurado.nit,
                        contratoObjeto: contrato.objeto, contratoNumero: contrato.numero, contratoValorSinIva: valorSinIva, contratoValorConIva: valorConIva, contratoDuracionDias: contrato.duracion,
                        amparosDetalleExcel, valorTotalCumplimiento: formatCurrency(totalCump), valorTotalRCE: formatCurrency(totalRCE), valorGranTotal: formatCurrency(totalGeneral), adjuntos: attachments
                    };

                    const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (res.ok) { 
                        alert("✅ Solicitud enviada con éxito. La Orden de Servicio fue anexada correctamente."); 
                        setConsecutivo(generarConsecutivoLocal()); 
                    } else { throw new Error(res.status); }
                } catch (e) { alert("❌ Error: " + e.message); } finally { setIsSubmitting(false); }
            };

            const inputCls = "w-full p-2.5 soft-input text-[#12334F] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#58C9E8] transition-all text-sm";
            const labelCls = "block text-xs font-bold text-[#5c7792] uppercase tracking-wider mb-1.5";
            const sectionCls = "bg-white rounded-xl p-6 shadow-sm border border-[#dce4ec] mb-6";

            return (
                <div className="flex h-screen w-full overflow-hidden">
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                        
                        {/* Header Cotizador */}
                        <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm rounded-xl flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-white/10 rounded-lg"><Calculator size={32} className="text-[#58C9E8]" /></div>
                                <div><h1 className="text-2xl font-bold tracking-wide">Módulo de Cotización</h1><p className="text-[#58C9E8] text-sm">CUMPLIMIENTO & RCE</p></div>
                            </div>
                            <div className="text-right hidden md:block"><p className="text-xs text-gray-300">ID SOLICITUD</p><p className="font-mono font-bold text-xl">{consecutivo}</p></div>
                        </div>

                        {/* Bloque 0: Solicitante */}
                        <div className={sectionCls}>
                            <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b pb-2"><User size={20} className="text-[#58C9E8]" /> 0. Datos del Solicitante</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className={labelCls}>Nombre Solicitante *</label><input type="text" className={inputCls} value={interno.solicitante} onChange={e => setInterno({...interno, solicitante: e.target.value})} /></div>
                                <div><label className={labelCls}>Correo Electrónico *</label><input type="email" className={inputCls} value={interno.solicitanteEmail} onChange={e => setInterno({...interno, solicitanteEmail: e.target.value})} /></div>
                                <div className="md:col-span-2"><label className={labelCls}>Asunto / Proyecto</label><input type="text" className={inputCls} value={interno.asunto} onChange={e => setInterno({...interno, asunto: e.target.value})} /></div>
                            </div>
                            <div className="mt-4 mb-4">
                                <label className={labelCls}>Tipo de Solicitud</label>
                                <div className="flex flex-wrap gap-4 mt-2">
                                    <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.garantiaUnica} onChange={() => handleCheckboxTipos('garantiaUnica')} />Garantía Única</label>
                                    <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.cumplimientoParticulares} onChange={() => handleCheckboxTipos('cumplimientoParticulares')} />Cumplimiento Particulares</label>
                                    <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.cumplimientoEstatales} onChange={() => handleCheckboxTipos('cumplimientoEstatales')} />Cumplimiento Estatales</label>
                                    <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.disposicionLegal} onChange={() => handleCheckboxTipos('disposicionLegal')} />Disposición Legal</label>
                                    <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.otros} onChange={() => handleCheckboxTipos('otros')} />Otros</label>
                                </div>
                            </div>
                            <div className="bg-[#eef3f8] p-4 rounded-lg border border-[#cdd7e0]">
                                <label className={labelCls}>Soportes y Contratos (PDF)</label>
                                <div className="flex items-center gap-3 mt-2">
                                    <label className="cursor-pointer bg-white px-4 py-2 border border-[#cdd7e0] rounded-md text-sm font-medium hover:bg-gray-50 flex items-center gap-2 shadow-sm">
                                        <Paperclip size={16} className="text-[#5c7792]" /> Seleccionar Archivos
                                        <input type="file" multiple className="sr-only" onChange={handleFileChange} />
                                    </label>
                                    <span className="text-sm text-[#5c7792]">{interno.archivos.length === 0 ? "Ningún archivo" : `${interno.archivos.length} archivo(s)`}</span>
                                </div>
                            </div>
                        </div>

                        {/* Bloque 1: Tomador */}
                        <div className={sectionCls}>
                            <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b pb-2"><Building size={20} className="text-[#58C9E8]" /> 1. Tomador y Asegurado</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div><label className={labelCls}>Tomador Razón Social *</label><input type="text" className={inputCls} value={tomador.nombre} onChange={e => setTomador({...tomador, nombre: e.target.value})} /></div>
                                <div><label className={labelCls}>Tomador NIT *</label><input type="text" className={inputCls} value={tomador.nit} onChange={e => setTomador({...tomador, nit: e.target.value})} /></div>
                                <div className="md:col-span-2"><label className={labelCls}>Dirección Tomador</label><input type="text" className={inputCls} value={tomador.direccion} onChange={e => setTomador({...tomador, direccion: e.target.value})} /></div>
                                <div><label className={labelCls}>Teléfono / Celular</label><input type="text" className={inputCls} value={tomador.telefono} onChange={e => setTomador({...tomador, telefono: e.target.value})} /></div>
                                <div><label className={labelCls}>E-mail</label><input type="email" className={inputCls} value={tomador.email} onChange={e => setTomador({...tomador, email: e.target.value})} /></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-dashed">
                                <div><label className={labelCls}>Asegurado Razón Social *</label><input type="text" className={inputCls} value={asegurado.nombre} onChange={e => setAsegurado({...asegurado, nombre: e.target.value})} /></div>
                                <div><label className={labelCls}>Asegurado NIT</label><input type="text" className={inputCls} value={asegurado.nit} onChange={e => setAsegurado({...asegurado, nit: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* Bloque 2: Contrato */}
                        <div className={sectionCls}>
                            <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b pb-2"><FileText size={20} className="text-[#58C9E8]" /> 2. Datos del Contrato</h3>
                            <div className="grid grid-cols-1 md:grid-cols-6 gap-4">
                                <div className="md:col-span-6"><label className={labelCls}>Objeto del Contrato *</label><textarea maxLength="2000" className={`${inputCls} h-20`} value={contrato.objeto} onChange={e => setContrato({...contrato, objeto: e.target.value})}></textarea></div>
                                <div className="md:col-span-2"><label className={labelCls}>Número</label><input type="text" className={inputCls} value={contrato.numero} onChange={e => setContrato({...contrato, numero: e.target.value})} /></div>
                                <div className="md:col-span-2">
                                    <label className={labelCls}>Valor CON IVA *</label>
                                    <div className="relative">
                                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                        <input type="text" className={`${inputCls} pl-8`} value={contrato.valorConIva?contrato.valorConIva.toLocaleString('es-CO'):''} onChange={e => setContrato({...contrato, valorConIva: parseCurrency(e.target.value)})} />
                                    </div>
                                </div>
                                <div className="md:col-span-2">
                                    <label className={labelCls}>Valor SIN IVA</label>
                                    <div className="relative">
                                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none opacity-70">$</span>
                                        <input type="text" className={`${inputCls} bg-[#e4ebf1] font-semibold pl-8 cursor-not-allowed`} disabled value={valorSinIva ? valorSinIva.toLocaleString('es-CO', {maximumFractionDigits: 0}) : '0'} />
                                    </div>
                                </div>
                                <div className="md:col-span-2"><label className={labelCls}>Desde</label><input type="date" className={inputCls} value={contrato.desde} onChange={e => {
                                    const newDesde = e.target.value; let newDuracion = contrato.duracion;
                                    if (newDesde && contrato.hasta) { newDuracion = Math.ceil((new Date(contrato.hasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24)) > 0 ? Math.ceil((new Date(contrato.hasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24)) : 0; }
                                    setContrato({...contrato, desde: newDesde, duracion: newDuracion});
                                }} /></div>
                                <div className="md:col-span-2"><label className={labelCls}>Hasta</label><input type="date" className={inputCls} value={contrato.hasta} onChange={e => {
                                    const newHasta = e.target.value; let newDuracion = contrato.duracion;
                                    if (contrato.desde && newHasta) { newDuracion = Math.ceil((new Date(newHasta) - new Date(contrato.desde)) / (1000 * 60 * 60 * 24)) > 0 ? Math.ceil((new Date(newHasta) - new Date(contrato.desde)) / (1000 * 60 * 60 * 24)) : 0; }
                                    setContrato({...contrato, hasta: newHasta, duracion: newDuracion});
                                }} /></div>
                                <div className="md:col-span-2"><label className={labelCls}>Duración (Días)</label><input type="number" className={`${inputCls} bg-[#e4ebf1] font-semibold cursor-not-allowed`} disabled value={contrato.duracion} /></div>
                            </div>
                        </div>

                        {/* Bloque 3: Amparos */}
                        <div className={sectionCls}>
                            <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b pb-2"><Calculator size={20} className="text-[#58C9E8]" /> 3. Amparos y Garantías</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs text-left min-w-[1000px]">
                                    <thead className="bg-[#12334F] text-white">
                                        <tr>
                                            <th className="p-3">AMPARO</th>
                                            <th className="p-3 w-64">VIGENCIA (DESDE - HASTA)</th>
                                            <th className="p-3 text-center w-16">DÍAS</th>
                                            <th className="p-3 text-center w-24">% Vr. Aseg.</th>
                                            <th className="p-3 text-right w-44">VALOR ASEGURADO</th>
                                            <th className="p-3 text-center w-20">TASA %</th>
                                            <th className="p-3 text-right w-40">PRIMA</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                        {amparos.map(a => (
                                            <tr key={a.id} className={a.activo ? "bg-cyan-50/50" : "hover:bg-slate-50 transition-colors"}>
                                                <td className="p-3 flex items-center gap-2">
                                                    <input type="checkbox" className="w-4 h-4 rounded text-[#163f73]" checked={a.activo} onChange={() => handleAmparoToggle(a.id)} />
                                                    <span className={a.activo ? "font-bold text-[#163f73]" : ""}>{a.nombre}</span>
                                                </td>
                                                <td className="p-3">
                                                    <div className="flex gap-1">
                                                        <input type="date" className="p-1 border rounded w-full bg-white/50" disabled={!a.activo} value={a.desde} onChange={e => handleAmparoField(a.id, 'desde', e.target.value)} />
                                                        <input type="date" className="p-1 border rounded w-full bg-white/50" disabled={!a.activo} value={a.hasta} onChange={e => handleAmparoField(a.id, 'hasta', e.target.value)} />
                                                    </div>
                                                </td>
                                                <td className="p-3 text-center font-bold text-slate-500">{a.dias || '-'}</td>
                                                <td className="p-3">
                                                    <input type="text" placeholder="%" className="w-full text-center p-1 border rounded bg-white/50 font-semibold" disabled={!a.activo} value={a.porcentaje} onChange={e => handleAmparoField(a.id, 'porcentaje', e.target.value)} />
                                                </td>
                                                <td className="p-3">
                                                    <div className="relative flex items-center">
                                                        <span className={`absolute left-2 text-[#5c7792] font-bold text-sm pointer-events-none ${!a.activo && 'opacity-50'}`}>$</span>
                                                        <input type="text" className="w-full pl-6 text-right p-1 border rounded bg-white/50 font-medium" disabled={!a.activo} value={a.valorAseguradoStr !== undefined ? a.valorAseguradoStr : (a.valorAsegurado ? a.valorAsegurado.toLocaleString('es-CO',{minimumFractionDigits:0, maximumFractionDigits:2}) : '')} onChange={e => handleAmparoField(a.id, 'valorAsegurado', e.target.value)} />
                                                    </div>
                                                </td>
                                                <td className="p-3">
                                                    <input type="text" className="w-full text-center p-1 border rounded bg-slate-100 font-semibold text-[#5c7792] cursor-not-allowed" disabled value={a.tasa} onChange={e => handleAmparoField(a.id, 'tasa', e.target.value)} />
                                                </td>
                                                <td className="p-3 text-right font-bold text-[#163f73]">{formatCurrency(a.prima)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Bloque 4: Ajustes y Totales */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className={sectionCls}>
                                <h3 className="font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2">Ajustes Adicionales</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className={labelCls}>Gastos Cumplimiento</label>
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                            <input type="text" className={`${inputCls} pl-8`} value={costos.gastosCump?costos.gastosCump.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosCump: parseCurrency(e.target.value)})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className={labelCls}>Gastos RCE</label>
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                            <input type="text" className={`${inputCls} pl-8`} value={costos.gastosRCE?costos.gastosRCE.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosRCE: parseCurrency(e.target.value)})} />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-[#12334F] rounded-xl p-6 shadow-lg border border-[#163f73] text-white">
                                <h3 className="font-bold text-[#58C9E8] mb-4">Liquidación Final</h3>
                                <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                    <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1 text-sm">Póliza de Cumplimiento</h4>
                                    <div className="space-y-1 text-sm text-gray-300">
                                        <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaCumplimiento)}</span></div>
                                        <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosCump)}</span></div>
                                        <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaCump)}</span></div>
                                        <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                            <span>Total Cumplimiento:</span> <span>{formatCurrency(totalCump)}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                    <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1 text-sm">Póliza de Responsabilidad Civil (RCE)</h4>
                                    <div className="space-y-1 text-sm text-gray-300">
                                        <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaRCE)}</span></div>
                                        <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosRCE)}</span></div>
                                        <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaRCE)}</span></div>
                                        <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                            <span>Total RCE:</span> <span>{formatCurrency(totalRCE)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Footer de Acción */}
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6 bg-[#12334F] p-8 rounded-3xl text-white shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-[#58C9E8] opacity-10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                            <div className="z-10">
                                <p className="text-[10px] text-[#58C9E8] font-black tracking-widest uppercase mb-1">Gran Total Liquidado (IVA Inc.)</p>
                                <h2 className="text-4xl font-black">{formatCurrency(totalGeneral)}</h2>
                            </div>
                            <div className="flex flex-wrap gap-3 z-10">
                                <button onClick={exportarCotizacion} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-xl font-bold transition-all border border-white/20">RESUMEN</button>
                                <button onClick={imprimirCotizacion} className="px-6 py-3 bg-[#e8f7fb] text-[#163f73] hover:bg-[#d0f0fa] rounded-xl font-bold flex items-center gap-2 border border-[#58C9E8]"><Printer size={18} /> PDF MANUAL</button>
                                <button onClick={enviarAegis} disabled={isSubmitting} className="px-10 py-3 bg-[#58C9E8] text-[#12334F] hover:bg-[#4dbddb] rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all">
                                    {isSubmitting ? "ENVIANDO..." : <><Send size={18}/> ENVIAR A AEGIS</>}
                                </button>
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
