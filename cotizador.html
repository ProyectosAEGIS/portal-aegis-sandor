                                                                    <div className={`inline-flex flex-col items-center p-2 rounded-lg ${isMenorUnDia ? 'bg-[#e8f7fb]' : 'bg-orange-50'}`}>
                                                                        <span className={`font-bold ${isMenorUnDia ? 'text-[#163f73]' : 'text-orange-700'}`}>{policy.ansHoras.toFixed(1)} h</span>
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-[10px] font-bold border ${isAnulada ? 'bg-red-50 text-red-700 border-red-200' : (policy.estado === 'Finalizada' || policy.estado === 'Emitida-Entregada') ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>
                                                                        {policy.estado}
                                                                    </span>
                                                                </td>
                                                            </tr>
                                                        )
                                                    })}
                                                    {produccionLiveFiltrada.length === 0 && (
                                                        <tr><td colSpan="6" className="text-center py-8 text-gray-400">Aún no hay solicitudes registradas para medir.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mt-8">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50"><h4 className="text-lg font-bold text-[#163f73]">Resumen Consolidado por Tomador</h4></div>
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-gray-50 border-b border-gray-200">
                                                <tr className="text-gray-500 text-xs uppercase tracking-wider">
                                                    <th className="px-6 py-4 font-semibold">Tomador (Cliente)</th>
                                                    <th className="px-6 py-4 font-semibold text-center">Total Órdenes</th>
                                                    <th className="px-6 py-4 font-semibold text-right">Valor Total Asegurado</th>
                                                    <th className="px-6 py-4 font-semibold text-right">Prima Total</th>
                                                    <th className="px-6 py-4 font-semibold text-center">% de Participación</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 text-sm">
                                                {prodSummaryArray.map((item, idx) => {
                                                    const porcentaje = prodTotalValor > 0 ? ((item.totalValor / prodTotalValor) * 100).toFixed(1) : 0;
                                                    return (
                                                        <tr key={idx} className="hover:bg-blue-50/20 transition-colors">
                                                            <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{item.cliente}</div></td>
                                                            <td className="px-6 py-4 text-center"><span className="w-8 h-8 rounded-full bg-[#e8f7fb] text-[#163f73] font-bold inline-flex items-center justify-center">{item.count}</span></td>
                                                            <td className="px-6 py-4 text-right"><span className="font-bold text-[#12334F]">{formatCurrency(item.totalValor)}</span></td>
                                                            <td className="px-6 py-4 text-right"><span className="font-bold text-green-700">{formatCurrency(item.totalPrima)}</span></td>
                                                            <td className="px-6 py-4 text-center">{porcentaje}%</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                    
                                
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 3: REPORTE CARTERA                                  */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'cartera' ? 'block p-4 md:p-8 pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm mb-6 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white/10 rounded-lg"><PieChart size={32} className="text-[#58C9E8]" /></div>
                                        <div><h1 className="text-2xl font-bold tracking-wide">Reporte de Cartera</h1><p className="text-[#58C9E8] text-sm font-medium">FINANZAS Y RECAUDO</p></div>
                                    </div>
                                </div>

                                <div className="w-full max-w-[1600px] mx-auto space-y-8">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div><h3 className="text-lg font-bold text-[#163f73]">Cargar Cartera Contable</h3><p className="text-sm text-gray-500">Actualiza las deudas subiendo un CSV contable.</p></div>
                                        <label className="cursor-pointer px-4 py-2.5 text-sm font-medium text-white bg-[#163f73] rounded-lg hover:bg-[#12334F] flex items-center gap-2"><DollarSign size={16} /> Cargar CSV<input type="file" accept=".csv" className="hidden" onChange={(e) => handleCsvUpload(e, 'cartera')} /></label>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-blue-50 rounded-lg text-[#163f73]"><FileText size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Pólizas Pendientes</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{cartTotal}</h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-[#e8f7fb] rounded-lg text-[#58C9E8]"><Calendar size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Antigüedad Promedio</p><h4 className="text-3xl font-bold text-[#163f73] mt-1">{cartPromedioDias} <span className="text-lg text-gray-500 font-normal">días</span></h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-orange-50 rounded-lg text-orange-500"><AlertCircle size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Valor Total Adeudado</p><h4 className="text-2xl font-bold text-[#12334F] mt-1">{formatCurrency(cartSumaTotal)}</h4></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 5: CENTRO DE AYUDA                                  */}
                            {/* ========================================================= */}
                            {activeMenu === 'soporte' && (
                                <div className="p-4 md:p-8 pb-20">
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-200 max-w-3xl mx-auto space-y-6">
                                        <h1 className="text-2xl font-bold text-[#163f73] flex items-center gap-3">
                                            <LifeBuoy size={32} className="text-[#58C9E8]" /> Centro de Ayuda y Soporte - Portal WEB-AEGIS
                                        </h1>
                                        <p className="text-gray-600 text-sm leading-relaxed">Usted se encuentra operando la versión core compilada <b>v2.18.0</b>, optimizada con blindaje inmutable para el resguardo preventivo de archivos adjuntos en Firebase Storage[cite: 15, 21].</p>
                                        <div className="bg-blue-50 p-6 rounded-lg border border-blue-100">
                                            <h3 className="font-bold text-[#163f73] mb-2">Canal Técnico de Reingeniería</h3>
                                            <p className="text-xs text-gray-600">Cualquier error de timeout o caída asíncrona de los servidores centrales de automatización Make.com puede ser resuelto de inmediato usando el botón nativo de <b>Auto-Sanar</b> en la vista de Mis Solicitudes[cite: 17, 21, 35].</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
