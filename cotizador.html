            return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;

                        setCarteraData(rows.slice(1).map(row => {
                            const cols = row.split(sep);
                            return { tomador: cols[0]?.trim() || '-', beneficiario: cols[1]?.trim() || '-', ramo: cols[2]?.trim() || '-', poliza: cols[3]?.trim() || '-', dias: parseInt(cols[4]) || 0, total: parseFloat(cols[5]) || 0 };
                        }));
                    }
                    e.target.value = '';
                };
                reader.readAsText(file, 'UTF-8');
            };

            // Cálculos Producción
            const prodTotal = produccionData.length;
            const prodMenorUnDia = produccionData.filter(p => p.ansHoras <= 24).length;
            const prodPorcentaje = prodTotal > 0 ? Math.round((prodMenorUnDia / prodTotal) * 100) : 0;
            const prodMediana = getMedian(produccionData.map(p => p.ansHoras)).toFixed(1);
            const prodTotalValor = produccionData.reduce((acc, curr) => acc + curr.valor, 0);
            
            const prodSummary = produccionData.reduce((acc, curr) => {
                if (!acc[curr.cliente]) acc[curr.cliente] = { count: 0, totalValor: 0 };
                acc[curr.cliente].count += 1; acc[curr.cliente].totalValor += curr.valor;
                return acc;
            }, {});
            const prodSummaryArray = Object.keys(prodSummary).map(k => ({ cliente: k, ...prodSummary[k] })).sort((a, b) => b.totalValor - a.totalValor);

            // Cálculos Cartera
            const cartTotal = carteraData.length;
            const cartSumaTotal = carteraData.reduce((acc, curr) => acc + curr.total, 0);
            const cartSana = carteraData.filter(p => p.dias <= 15).reduce((acc, curr) => acc + curr.total, 0);
            const cartAntigua = carteraData.filter(p => p.dias > 15).reduce((acc, curr) => acc + curr.total, 0);
            const cartPorcentajeSana = cartSumaTotal > 0 ? ((cartSana / cartSumaTotal) * 100).toFixed(1) : 0;
            const cartPromedioDias = cartTotal > 0 ? (carteraData.reduce((acc, curr) => acc + curr.dias, 0) / cartTotal).toFixed(1) : 0;

            const cartSummary = carteraData.reduce((acc, curr) => {
                if (!acc[curr.tomador]) acc[curr.tomador] = { count: 0, total: 0 };
                acc[curr.tomador].count += 1; acc[curr.tomador].total += curr.total;
                return acc;
            }, {});
            const cartSummaryArray = Object.keys(cartSummary).map(k => ({ tomador: k, ...cartSummary[k] })).sort((a, b) => b.total - a.total);

            const inputClass = "w-full p-2.5 bg-[#eef3f8] border border-[#cdd7e0] text-[#12334F] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#58C9E8] focus:bg-white transition-all";
            const labelClass = "block text-xs font-bold text-[#5c7792] uppercase tracking-wider mb-1.5";
            const sectionClass = "bg-white rounded-xl p-6 shadow-sm border border-[#dce4ec] mb-6";

            return (
                <div className="fixed inset-0 flex bg-[#e6edf3] overflow-hidden w-full h-full">
                    
                    {/* SIDEBAR CORPORATIVO */}
                    <aside className={`fixed inset-y-0 left-0 bg-[#12334F] w-64 text-white flex flex-col transition-transform duration-300 z-40 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="h-20 flex items-center px-6 border-b border-white/10 bg-[#0e273d] flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="p-1.5 bg-gradient-to-br from-[#58C9E8] to-[#163f73] rounded-lg shadow-lg">
                                    <Shield size={28} className="text-white" strokeWidth={2.5} />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-wide uppercase leading-tight">AEGIS</h1>
                                    <p className="text-[#58C9E8] text-[10px] font-medium tracking-widest uppercase">Insurance</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            <p className="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Menú Principal</p>
                            {menuItems.map(item => {
                                const Icon = item.icon;
                                const isActive = activeMenu === item.id;
                                return (
                                    <button 
                                        key={item.id}
                                        onClick={() => { setActiveMenu(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all text-sm font-medium ${
                                            isActive ? 'bg-gradient-to-r from-[#163f73] to-[#12334F] border border-[#58C9E8]/30 text-white shadow-md' : 'text-gray-300 hover:bg-white/5 hover:text-white'
                                        }`}
                                    >
                                        <Icon size={18} className={isActive ? 'text-[#58C9E8]' : 'text-gray-400'} />
                                        {item.label}
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="p-4 border-t border-white/10 bg-[#0e273d] flex-shrink-0">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-[#58C9E8] flex items-center justify-center text-[#12334F] font-bold text-sm">GS</div>
                                <div className="text-left flex-1">
                                    <p className="text-sm font-semibold text-white leading-tight">Grupo Sandor</p>
                                    <p className="text-xs text-[#58C9E8]">Cliente Corporativo</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    {/* CONTENEDOR PRINCIPAL */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        
                        <header className="h-20 bg-white shadow-sm border-b border-gray-200 flex items-center justify-between px-4 sm:px-8 z-10 flex-shrink-0">
                            <div className="flex items-center gap-4">
                                <button className="md:hidden text-gray-500 hover:text-[#163f73] p-1" onClick={() => setIsMobileMenuOpen(true)}>
                                    <MenuIcon size={26} />
                                </button>
                                <h2 className="text-xl font-bold text-[#163f73] hidden sm:block">Portal de Servicios AEGIS</h2>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm text-gray-500 font-medium hidden md:block">
                                    {new Date().toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </span>
                                <div className="w-px h-6 bg-gray-300 hidden md:block"></div>
                                <button className="relative p-2 text-gray-400 hover:text-[#163f73] transition-colors rounded-full hover:bg-gray-100"><Bell size={20} /></button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto bg-[#e6edf3] relative w-full">
                            
                            {/* ========================================================= */}
                            {/* VISTA 1: COTIZADOR                                        */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'cotizador' ? 'block pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm mb-8 md:m-4 md:rounded-xl">
                                    <div className="w-full flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 bg-white/10 rounded-lg"><Calculator size={32} className="text-[#58C9E8]" strokeWidth={2} /></div>
                                            <div><h1 className="text-2xl font-bold tracking-wide">Módulo de Cotización</h1><p className="text-[#58C9E8] text-sm font-medium">CUMPLIMIENTO & RCE</p></div>
                                        </div>
                                        <div className="text-right hidden md:block"><p className="text-gray-300 text-sm">Operación Exclusiva</p><p className="font-bold text-white">Grupo Sandor</p></div>
                                    </div>
                                </div>

                                <div className="w-full px-4 sm:px-6 lg:px-8 max-w-[1600px] mx-auto">
                                    <div className={sectionClass}>
                                        <h3 className="text-lg font-bold text-[#163f73] mb-4 flex items-center gap-2 border-b border-gray-100 pb-2"><User size={20} className="text-[#58C9E8]" /> 0. Datos del solicitante</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div><label className={labelClass}>Nombre de quien diligencia *</label><input type="text" className={inputClass} placeholder="Ej. Juan Pérez" value={interno.solicitante} onChange={e => setInterno({...interno, solicitante: e.target.value})} /></div>
                                            <div><label className={labelClass}>Correo electrónico *</label><input type="email" className={inputClass} placeholder="Ej. juan@gruposandor.com" value={interno.solicitanteEmail} onChange={e => setInterno({...interno, solicitanteEmail: e.target.value})} /></div>
                                            <div><label className={labelClass}>Asunto *</label><input type="text" className={inputClass} value={interno.asunto} onChange={e => setInterno({...interno, asunto: e.target.value})} /></div>
                                            <div><label className={labelClass}>Consecutivo</label><input type="text" className={`${inputClass} bg-[#e8f7fb] font-bold cursor-not-allowed`} disabled value={consecutivo} /></div>
                                        </div>
                                        
                                        {/* Añadido: Checkboxes de Tipos de Solicitud */}
                                        <div className="mb-4">
                                            <label className={labelClass}>Tipo de Solicitud</label>
                                            <div className="flex flex-wrap gap-4 mt-2">
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.garantiaUnica} onChange={() => handleCheckboxTipos('garantiaUnica')} />Garantía Única</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.cumplimientoParticulares} onChange={() => handleCheckboxTipos('cumplimientoParticulares')} />Cumplimiento Particulares</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.cumplimientoEstatales} onChange={() => handleCheckboxTipos('cumplimientoEstatales')} />Cumplimiento Estatales</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.disposicionLegal} onChange={() => handleCheckboxTipos('disposicionLegal')} />Disposición Legal</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.otros} onChange={() => handleCheckboxTipos('otros')} />Otros</label>
                                            </div>
                                        </div>

                                        <div className="bg-[#eef3f8] p-4 rounded-lg border border-[#cdd7e0]">
                                            <label className={labelClass}>Adjuntar Documentos (Contratos)</label>
                                            <div className="mt-2 flex items-center gap-3">
                                                <label className="cursor-pointer bg-white px-4 py-2 border border-[#cdd7e0] rounded-md text-sm font-medium hover:bg-gray-50 flex items-center gap-2 shadow-sm">
                                                    <Paperclip size={16} className="text-[#5c7792]" /> Seleccionar Archivos
                                                    <input type="file" multiple className="sr-only" onChange={handleFileChange} />
                                                </label>
                                                <span className="text-sm text-[#5c7792]">{interno.archivos.length === 0 ? "Ningún archivo" : `${interno.archivos.length} archivo(s)`}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={sectionClass}>
                                        <h3 className="text-lg font-bold text-[#163f73] mb-4 flex items-center gap-2 border-b border-[#dce4ec] pb-2"><Building size={20} className="text-[#58C9E8]" /> 1. Tomador / Afianzado</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="md:col-span-2"><label className={labelClass}>Razón Social *</label><input type="text" className={inputClass} value={tomador.nombre} onChange={e => setTomador({...tomador, nombre: e.target.value})} /></div>
                                            <div><label className={labelClass}>NIT *</label><input type="text" className={inputClass} value={tomador.nit} onChange={e => setTomador({...tomador, nit: e.target.value})} /></div>
                                            <div className="md:col-span-3"><label className={labelClass}>Dirección</label><input type="text" className={inputClass} value={tomador.direccion} onChange={e => setTomador({...tomador, direccion: e.target.value})} /></div>
                                            <div><label className={labelClass}>Teléfono</label><input type="text" className={inputClass} value={tomador.telefono} onChange={e => setTomador({...tomador, telefono: e.target.value})} /></div>
                                            <div><label className={labelClass}>Celular</label><input type="text" className={inputClass} value={tomador.celular} onChange={e => setTomador({...tomador, celular: e.target.value})} /></div>
                                            <div><label className={labelClass}>E-mail *</label><input type="email" className={inputClass} value={tomador.email} onChange={e => setTomador({...tomador, email: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    <div className={sectionClass}>
                                        <h3 className="text-lg font-bold text-[#163f73] mb-4 flex items-center gap-2 border-b border-[#dce4ec] pb-2"><Shield size={20} className="text-[#58C9E8]" /> 2. Asegurado / Beneficiario</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="md:col-span-2"><label className={labelClass}>Razón Social *</label><input type="text" className={inputClass} value={asegurado.nombre} onChange={e => setAsegurado({...asegurado, nombre: e.target.value})} /></div>
                                            <div><label className={labelClass}>NIT *</label><input type="text" className={inputClass} value={asegurado.nit} onChange={e => setAsegurado({...asegurado, nit: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    <div className={sectionClass}>
                                        <h3 className="text-lg font-bold text-[#163f73] mb-4 flex items-center gap-2 border-b border-[#dce4ec] pb-2"><FileText size={20} className="text-[#58C9E8]" /> 3. Datos del Contrato</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                            <div className="md:col-span-4 relative"><label className={labelClass}>Objeto *</label><textarea rows="2" maxLength="1000" className={inputClass} value={contrato.objeto} onChange={e => setContrato({...contrato, objeto: e.target.value})}></textarea></div>
                                            <div><label className={labelClass}>Número</label><input type="text" className={inputClass} value={contrato.numero} onChange={e => setContrato({...contrato, numero: e.target.value})} /></div>
                                            <div><label className={labelClass}>Valor SIN IVA</label><input type="text" className={inputClass} value={contrato.valorSinIva?contrato.valorSinIva.toLocaleString('es-CO'):''} onChange={e => setContrato({...contrato, valorSinIva: parseCurrency(e.target.value)})} /></div>
                                            <div><label className={labelClass}>Valor CON IVA</label><input type="text" className={`${inputClass} bg-[#e4ebf1] font-semibold`} disabled value={formatCurrency(valorConIva)} /></div>
                                            <div><label className={labelClass}>Duración (Días)</label><input type="number" className={inputClass} value={contrato.duracion} onChange={e => setContrato({...contrato, duracion: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    <div className={sectionClass}>
                                        <h3 className="text-lg font-bold text-[#163f73] mb-2 flex items-center gap-2 border-b border-[#dce4ec] pb-2"><Calculator size={20} className="text-[#58C9E8]" /> 4. Amparos y Garantías</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left min-w-[900px]">
                                                <thead className="bg-[#e6edf3] text-xs uppercase tracking-wider text-[#163f73]">
                                                    <tr>
                                                        <th className="px-4 py-3 font-semibold rounded-tl-lg">Amparo</th><th className="px-4 py-3 font-semibold w-32">Desde</th><th className="px-4 py-3 font-semibold w-32">Hasta</th>
                                                        <th className="px-2 py-3 font-semibold text-center w-16">Días</th><th className="px-4 py-3 font-semibold w-40 text-right">Valor Asegurado</th>
                                                        <th className="px-2 py-3 font-semibold text-center w-24">Tasa %</th><th className="px-4 py-3 font-semibold w-32 text-right rounded-tr-lg">Prima</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-[#dce4ec]">
                                                    {amparos.map(amp => (
                                                        <tr key={amp.id} className={amp.activo ? "bg-[#e8f7fb]" : "hover:bg-[#f4f7f9] transition-colors"}>
                                                            <td className="px-4 py-3"><label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded border-[#cdd7e0]" checked={amp.activo} onChange={() => handleAmparoToggle(amp.id)} /><span className="text-sm font-medium text-[#12334F]">{amp.nombre}</span></label></td>
                                                            <td className="px-2 py-3"><input type="date" className="w-full p-1.5 text-xs border border-[#cdd7e0] rounded bg-[#eef3f8] focus:bg-white focus:ring-1 focus:ring-[#58C9E8] outline-none disabled:opacity-50 disabled:bg-[#e4ebf1] transition-colors" disabled={!amp.activo} value={amp.desde} onChange={e => handleAmparoField(amp.id, 'desde', e.target.value)} /></td>
                                                            <td className="px-2 py-3"><input type="date" className="w-full p-1.5 text-xs border border-[#cdd7e0] rounded bg-[#eef3f8] focus:bg-white focus:ring-1 focus:ring-[#58C9E8] outline-none disabled:opacity-50 disabled:bg-[#e4ebf1] transition-colors" disabled={!amp.activo} value={amp.hasta} onChange={e => handleAmparoField(amp.id, 'hasta', e.target.value)} /></td>
                                                            <td className="px-2 py-3 text-center"><span className="text-sm font-bold text-[#5c7792]">{amp.dias || '-'}</span></td>
                                                            <td className="px-4 py-3"><input type="text" className="w-full p-1.5 text-sm text-right font-semibold border border-[#cdd7e0] rounded bg-[#eef3f8] focus:bg-white focus:ring-1 focus:ring-[#58C9E8] outline-none disabled:opacity-50 disabled:bg-[#e4ebf1] transition-colors" disabled={!amp.activo} value={amp.valorAsegurado?amp.valorAsegurado.toLocaleString('es-CO'):''} onChange={e => handleAmparoField(amp.id, 'valorAsegurado', parseCurrency(e.target.value))} /></td>
                                                            <td className="px-2 py-3"><input type="text" className="w-full p-1.5 text-xs text-center border border-[#cdd7e0] rounded bg-[#e6edf3] text-[#5c7792] font-semibold disabled:opacity-70" disabled value={amp.tasa} /></td>
                                                            <td className="px-4 py-3 text-right"><span className="text-sm font-bold text-[#163f73]">{formatCurrency(amp.prima)}</span></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* 5. TOTALES (Con desglose completo) */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-[#dce4ec]"><h3 className="font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2">Ajustes Adicionales</h3>
                                            <div className="space-y-4">
                                                <div><label className={labelClass}>Gastos Cumplimiento</label><input type="text" className={inputClass} value={costos.gastosCump?costos.gastosCump.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosCump: parseCurrency(e.target.value)})} /></div>
                                                <div><label className={labelClass}>Gastos RCE</label><input type="text" className={inputClass} value={costos.gastosRCE?costos.gastosRCE.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosRCE: parseCurrency(e.target.value)})} /></div>
                                            </div>
                                        </div>
                                        <div className="bg-[#12334F] rounded-xl p-6 shadow-lg border border-[#163f73] text-white">
                                            <h3 className="font-bold text-[#58C9E8] mb-4">Liquidación Final</h3>
                                            
                                            {/* Bloque Cumplimiento */}
                                            <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                                <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1">Póliza de Cumplimiento</h4>
                                                <div className="space-y-1 text-sm text-gray-300">
                                                    <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaCumplimiento)}</span></div>
                                                    <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosCump)}</span></div>
                                                    <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaCump)}</span></div>
                                                    <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                                        <span>Total Cumplimiento:</span> <span>{formatCurrency(totalCump)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Bloque RCE */}
                                            <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                                <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1">Póliza de Responsabilidad Civil (RCE)</h4>
                                                <div className="space-y-1 text-sm text-gray-300">
                                                    <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaRCE)}</span></div>
                                                    <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosRCE)}</span></div>
                                                    <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaRCE)}</span></div>
                                                    <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                                        <span>Total RCE:</span> <span>{formatCurrency(totalRCE)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Gran Total */}
                                            <div className="bg-[#58C9E8] rounded-lg p-4 text-[#12334F] font-bold text-xl flex justify-between mt-2 shadow-sm">
                                                <span>GRAN TOTAL:</span><span>{formatCurrency(totalGeneral)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* BOTONES COTIZADOR */}
                                    <div className="mt-8 flex flex-wrap justify-center gap-4 bg-white p-5 rounded-xl shadow-sm border border-[#dce4ec]">
                                        <button onClick={limpiarFormularioCotizador} className="px-6 py-3 text-red-600 bg-red-50 rounded-lg flex items-center gap-2 font-medium hover:bg-red-100 transition-colors"><Trash2 size={18} /> Limpiar</button>
                                        <button onClick={exportarCotizacion} className="px-6 py-3 text-[#12334F] bg-[#eef3f8] rounded-lg flex items-center gap-2 font-medium hover:bg-[#e4ebf1] border border-[#cdd7e0] transition-colors"><Save size={18} /> Resumen Rápido</button>
                                        <button onClick={imprimirCotizacion} className="px-6 py-3 text-[#163f73] bg-[#e8f7fb] rounded-lg flex items-center gap-2 font-medium hover:bg-[#d0f0fa] border border-[#58C9E8] transition-colors"><Printer size={18} /> Imprimir / PDF</button>
                                        <button onClick={enviarSolicitudWebhook} className="px-8 py-3 text-white bg-[#163f73] rounded-lg flex items-center gap-2 font-bold hover:bg-[#12334F] shadow-md disabled:opacity-50 transition-colors" disabled={isSubmitting}>
                                            {isSubmitting ? "Enviando..." : <><Send size={18} /> Enviar a AEGIS</>}
                                        </button>
                                    </div>
                                </div>
                            </div>

                                                                    <div className="text-[10px] uppercase font-bold text-gray-400 mt-1">{policy.ramo}</div>
                                                                </td>
                                                                <td className="px-6 py-4 text-center"><span className="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-700">{policy.poliza}</span></td>
                                                                <td className="px-6 py-4 text-center">
                                                                    <div className={`inline-flex items-center justify-center w-10 h-10 rounded-full font-bold ${isAntigua ? 'bg-orange-100 text-orange-700' : 'bg-[#e8f7fb] text-[#163f73]'}`}>{policy.dias}</div>
                                                                </td>
                                                                <td className="px-6 py-4 text-right"><span className="font-bold text-[#12334F] text-base">{formatCurrency(policy.total)}</span></td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* TABLA RESUMEN POR TOMADOR */}
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mt-8">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                                            <h4 className="text-lg font-bold text-[#163f73]">Resumen Consolidado por Tomador</h4>
                                            <span className="text-xs font-medium px-2 py-1 bg-[#163f73] text-white rounded-md shadow-sm">Totales Globales</span>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-gray-50 shadow-sm border-b border-gray-200">
                                                    <tr className="text-gray-500 text-xs uppercase tracking-wider">
                                                        <th className="px-6 py-4 font-semibold">Tomador / Cliente</th>
                                                        <th className="px-6 py-4 font-semibold text-center">Total Pólizas</th>
                                                        <th className="px-6 py-4 font-semibold text-right">Valor Total Adeudado</th>
                                                        <th className="px-6 py-4 font-semibold text-center">% de Participación</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 text-sm">
                                                    {cartSummaryArray.map((item, idx) => {
                                                        const porcentaje = ((item.total / cartSumaTotal) * 100).toFixed(1);
                                                        return (
                                                            <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                                <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{item.tomador}</div></td>
                                                                <td className="px-6 py-4 text-center"><span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-[#e8f7fb] text-[#163f73] font-bold">{item.count}</span></td>
                                                                <td className="px-6 py-4 text-right"><span className="font-bold text-[#12334F] text-base">{formatCurrency(item.total)}</span></td>
                                                                <td className="px-6 py-4 text-center">
                                                                    <div className="w-full bg-gray-200 rounded-full h-2 mt-1">
                                                                        <div className="bg-[#58C9E8] h-2 rounded-full" style={{ width: `${porcentaje}%` }}></div>
                                                                    </div>
                                                                    <span className="text-xs text-gray-500 font-semibold mt-1 inline-block">{porcentaje}%</span>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                                <tfoot className="bg-gray-100 font-bold border-t-2 border-gray-200 text-[#12334F]">
                                                    <tr>
                                                        <td className="px-6 py-4 text-right uppercase">Total General:</td>
                                                        <td className="px-6 py-4 text-center text-lg">{cartTotal}</td>
                                                        <td className="px-6 py-4 text-right text-lg">{formatCurrency(cartSumaTotal)}</td>
                                                        <td className="px-6 py-4 text-center text-lg">100%</td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 4: MÓDULOS EN CONSTRUCCIÓN                          */}
                            {/* ========================================================= */}
                            <div className={['inicio', 'solicitudes', 'soporte'].includes(activeMenu) ? 'flex h-full items-center justify-center p-6' : 'hidden'}>
                                <div className="bg-white rounded-xl border border-gray-200 border-dashed w-full max-w-2xl p-12 text-center shadow-sm">
                                    <Shield size={64} className="mx-auto text-[#58C9E8] mb-4 opacity-50" />
                                    <h2 className="text-2xl font-bold text-[#163f73]">Módulo en construcción</h2>
                                    <p className="text-gray-500 mt-2">Esta sección ({menuItems.find(m => m.id === activeMenu)?.label}) estará disponible próximamente en su portal.</p>
                                </div>
                            </div>

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
