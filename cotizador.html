<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Cotización - AEGIS Insurance</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        
        /* Estilos para evitar fatiga visual - Tonalidades Suaves */
        .soft-input {
            background-color: #e2e8f0; /* Tono azul grisáceo suave */
            border: 1px solid #94a3b8;
            color: #0f172a;
            transition: all 0.2s;
        }
        .soft-input:focus {
            background-color: #ffffff !important;
            border-color: #58C9E8;
            box-shadow: 0 0 0 3px rgba(88, 201, 232, 0.2);
            outline: none;
        }
        .section-card {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-[#e2e8f0] font-sans text-[#12334F] overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // Íconos SVG
        const Shield = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const Calculator = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16.01" y2="14"/><line x1="8" y1="14" x2="8.01" y2="14"/></svg>;
        const User = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const FileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        const Printer = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const Send = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;

        const WEBHOOK_URL = "https://hook.us2.make.com/6oy0xm0wdgimjdyb39wnxuxlbs2wunlw"; 

        const AMPAROS_BASE = [
            { id: 1, nombre: 'Seriedad de la Oferta', tasaDefault: 0.10 },
            { id: 2, nombre: 'Cumplimiento', tasaDefault: 0.18 },
            { id: 3, nombre: 'Buen Manejo del Anticipo', tasaDefault: 0.18 },
            { id: 4, nombre: 'Pagos de Salarios y Prestaciones', tasaDefault: 0.15 },
            { id: 5, nombre: 'Calidad del Servicio', tasaDefault: 0.18 },
            { id: 6, nombre: 'Calidad de los Bienes', tasaDefault: 0.18 },
            { id: 7, nombre: 'Estabilidad y Calidad', tasaDefault: 0.18 },
            { id: 8, nombre: 'Calidad y Correcto Funcionamiento', tasaDefault: 0.18 },
            { id: 9, nombre: 'Responsabilidad Civil Extracontractual', tasaDefault: 0.20 }
        ];

        function formatCurrency(amount) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(amount || 0);
        }

        function parseCurrency(val) {
            return parseInt(String(val).replace(/\D/g, ''), 10) || 0;
        }

        function App() {
            const [consecutivo, setConsecutivo] = React.useState('');
            const [interno, setInterno] = React.useState({ solicitante: '', solicitanteEmail: '', asunto: '', tipos: {}, archivos: [] });
            const [tomador, setTomador] = React.useState({ nombre: '', nit: '', direccion: '', telefono: '', email: '' });
            const [asegurado, setAsegurado] = React.useState({ nombre: '', nit: '' });
            const [contrato, setContrato] = React.useState({ objeto: '', numero: '', valorSinIva: 0, duracion: '' });
            const [amparos, setAmparos] = React.useState(AMPAROS_BASE.map(a => ({ ...a, activo: false, desde: '', hasta: '', dias: 0, valorAsegurado: 0, tasa: a.tasaDefault.toFixed(2), prima: 0 })));
            const [isSubmitting, setIsSubmitting] = React.useState(false);

            const generarConsecutivoLocal = () => {
                const n = new Date();
                const pad = (v) => String(v).padStart(2, '0');
                return `SANDOR-COT-${n.getFullYear().toString().slice(-2)}${pad(n.getMonth()+1)}${pad(n.getDate())}${pad(n.getHours())}${pad(n.getMinutes())}${pad(n.getSeconds())}`;
            };

            React.useEffect(() => { setConsecutivo(generarConsecutivoLocal()); }, []);

            const valorConIva = contrato.valorSinIva * 1.19;
            const primaCump = amparos.slice(0,8).reduce((acc, c) => c.activo ? acc + c.prima : acc, 0);
            const primaRCE = amparos[8].activo ? amparos[8].prima : 0;
            const totalG = (primaCump + 5000) * 1.19 + (primaRCE + 5000) * 1.19;

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                const totalSize = files.reduce((acc, f) => acc + f.size, 0);
                if (totalSize > 8 * 1024 * 1024) {
                    alert("⚠️ Atención: Los archivos superan los 8MB. Podría haber errores en el envío. Se recomienda comprimirlos.");
                }
                setInterno(prev => ({ ...prev, archivos: files }));
            };

            const exportarCotizacion = () => {
                const detallado = amparos.filter(a => a.activo).map(a => `- ${a.nombre}: ${formatCurrency(a.valorAsegurado)} (Prima: ${formatCurrency(a.prima)})`).join('\n');
                const resumen = `📋 COTIZACIÓN AEGIS\nID: ${consecutivo}\nSolicitante: ${interno.solicitante}\nTomador: ${tomador.nombre}\nObjeto: ${contrato.objeto}\n\n🛡️ AMPAROS:\n${detallado}\n\n💰 TOTAL: ${formatCurrency(totalG)}`;
                navigator.clipboard.writeText(resumen).then(() => alert("✅ Resumen copiado."));
            };

            const imprimirPDF = () => {
                const win = window.open('', '_blank');
                const ampRows = amparos.filter(a => a.activo).map(a => `<tr><td>${a.nombre}</td><td>${a.desde} al ${a.hasta}</td><td style="text-align:right">${formatCurrency(a.valorAsegurado)}</td><td style="text-align:right">${formatCurrency(a.prima)}</td></tr>`).join('');
                win.document.write(`
                    <html><head><title>Cotización ${consecutivo}</title>
                    <style>
                        body { font-family: sans-serif; padding: 50px; color: #1e293b; }
                        .header { border-bottom: 4px solid #58C9E8; margin-bottom: 30px; display: flex; justify-content: space-between; }
                        h1 { color: #163f73; margin: 0; }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th { background: #f1f5f9; text-align: left; padding: 10px; border: 1px solid #cbd5e1; }
                        td { padding: 10px; border: 1px solid #cbd5e1; }
                        .total { font-size: 24px; font-weight: bold; text-align: right; color: #163f73; }
                    </style></head>
                    <body>
                        <div class="header"><div><h1>AEGIS INSURANCE</h1><p>ID: ${consecutivo}</p></div><div style="text-align:right"><p>Fecha: ${new Date().toLocaleDateString()}</p></div></div>
                        <p><b>Tomador:</b> ${tomador.nombre} (NIT: ${tomador.nit})</p>
                        <p><b>Objeto:</b> ${contrato.objeto}</p>
                        <table><thead><tr><th>Amparo</th><th>Vigencia</th><th>V. Asegurado</th><th>Prima</th></tr></thead><tbody>${ampRows}</tbody></table>
                        <div class="total">GRAN TOTAL: ${formatCurrency(totalG)}</div>
                        <script>
                            window.onload = () => { 
                                window.print(); 
                                setTimeout(() => window.close(), 500); 
                            };
                        <\/script>
                    </body></html>`);
                win.document.close();
            };

            const handleAmparoToggle = (id) => {
                setAmparos(prev => prev.map(a => a.id === id ? { ...a, activo: !a.activo } : a));
            };

            const handleAmparoField = (id, field, value) => {
                setAmparos(prev => prev.map(a => {
                    if (a.id === id) {
                        const up = { ...a, [field]: value };
                        if ((field === 'desde' || field === 'hasta') && up.desde && up.hasta) {
                            up.dias = Math.ceil((new Date(up.hasta) - new Date(up.desde)) / (86400000)) || 0;
                        }
                        if (field === 'valorAsegurado') up.prima = value * (parseFloat(up.tasa) / 100);
                        return up;
                    }
                    return a;
                }));
            };

            const getBase64 = (file) => new Promise((res, rej) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = () => res({ name: file.name, contentBytes: r.result.split(',')[1] });
                r.onerror = e => rej(e);
            });

            const enviarAegis = async () => {
                if (!interno.solicitante || !tomador.nombre) return alert("Complete los campos obligatorios (*)");
                setIsSubmitting(true);
                try {
                    const files = await Promise.all(interno.archivos.map(getBase64));
                    const amparosDetalleExcel = amparos.filter(a => a.activo).map(a => 
                        `${a.nombre} | Vig: ${a.desde} a ${a.hasta} (${a.dias} d) | V.Aseg: ${formatCurrency(a.valorAsegurado)} | Tasa: ${a.tasa}% | Prima: ${formatCurrency(a.prima)}`
                    ).join('\n');

                    const payload = {
                        fechaRegistro: new Date().toLocaleString('es-CO'),
                        consecutivo, 
                        solicitanteNombre: interno.solicitante, solicitanteEmail: interno.solicitanteEmail, asunto: interno.asunto,
                        tomadorNombre: tomador.nombre, tomadorNit: tomador.nit, tomadorDireccion: tomador.direccion, tomadorTelefono: tomador.telefono, tomadorEmail: tomador.email,
                        aseguradoNombre: asegurado.nombre, aseguradoNit: asegurado.nit,
                        contratoObjeto: contrato.objeto, contratoNumero: contrato.numero, contratoValorSinIva: contrato.valorSinIva, contratoValorConIva: valorConIva, contratoDuracionDias: contrato.duracion,
                        amparosDetalleExcel, valorTotalCumplimiento: formatCurrency(primaCump), valorTotalRCE: formatCurrency(primaRCE), valorGranTotal: formatCurrency(totalG), adjuntos: files
                    };

                    const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (res.ok) { alert("✅ Enviado con éxito"); setConsecutivo(generarConsecutivoLocal()); } else throw new Error(res.status);
                } catch (e) { alert("❌ Error: " + e.message); } finally { setIsSubmitting(false); }
            };

            const labelCls = "block text-[10px] font-black text-slate-500 uppercase tracking-tighter mb-1";

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar Simulado */}
                    <aside className="w-64 bg-[#12334F] text-white p-6 hidden md:flex flex-col">
                        <div className="flex items-center gap-2 mb-10">
                            <Shield size={32} className="text-[#58C9E8]" />
                            <h2 className="font-bold text-xl">AEGIS</h2>
                        </div>
                        <nav className="space-y-4 text-sm opacity-80">
                            <p className="font-bold border-b border-white/10 pb-2 uppercase tracking-widest text-[10px]">Portal</p>
                            <p className="hover:text-[#58C9E8] cursor-pointer flex items-center gap-2"><Calculator size={16}/> Cotizador</p>
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                        <header className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <h1 className="text-xl font-black text-[#163f73]">NUEVA COTIZACIÓN</h1>
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-slate-400">ID SOLICITUD</p>
                                <p className="font-mono font-bold text-[#163f73]">{consecutivo}</p>
                            </div>
                        </header>

                        {/* Bloque 0: Solicitante */}
                        <div className="section-card p-6 rounded-2xl">
                            <h3 className="flex items-center gap-2 font-bold text-slate-700 mb-4 border-b pb-2 uppercase text-xs tracking-wider"><User size={18} /> Datos del Solicitante</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className={labelCls}>Nombre Solicitante *</label><input type="text" className="soft-input w-full p-2 rounded-lg" value={interno.solicitante} onChange={e => setInterno({...interno, solicitante: e.target.value})} /></div>
                                <div><label className={labelCls}>Correo Electrónico *</label><input type="email" className="soft-input w-full p-2 rounded-lg" value={interno.solicitanteEmail} onChange={e => setInterno({...interno, solicitanteEmail: e.target.value})} /></div>
                                <div className="md:col-span-2"><label className={labelCls}>Asunto / Proyecto</label><input type="text" className="soft-input w-full p-2 rounded-lg" value={interno.asunto} onChange={e => setInterno({...interno, asunto: e.target.value})} /></div>
                                <div>
                                    <label className={labelCls}>Soportes (PDF/Docs)</label>
                                    <div className="flex items-center gap-3">
                                        <input type="file" multiple className="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-[#12334F] file:text-white hover:file:bg-[#163f73]" onChange={handleFileChange} />
                                        {interno.archivos.length > 0 && <span className="text-[10px] font-bold text-[#58C9E8]">{interno.archivos.length} archivos cargados</span>}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Bloque 1: Tomador */}
                        <div className="section-card p-6 rounded-2xl">
                            <h3 className="flex items-center gap-2 font-bold text-slate-700 mb-4 border-b pb-2 uppercase text-xs tracking-wider"><Shield size={18} /> Partes del Seguro</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className={labelCls}>Tomador Razón Social *</label><input type="text" className="soft-input w-full p-2 rounded-lg" value={tomador.nombre} onChange={e => setTomador({...tomador, nombre: e.target.value})} /></div>
                                <div><label className={labelCls}>Tomador NIT *</label><input type="text" className="soft-input w-full p-2 rounded-lg" value={tomador.nit} onChange={e => setTomador({...tomador, nit: e.target.value})} /></div>
                                <div><label className={labelCls}>Asegurado Razón Social</label><input type="text" className="soft-input w-full p-2 rounded-lg" value={asegurado.nombre} onChange={e => setAsegurado({...asegurado, nombre: e.target.value})} /></div>
                                <div><label className={labelCls}>Asegurado NIT</label><input type="text" className="soft-input w-full p-2 rounded-lg" value={asegurado.nit} onChange={e => setAsegurado({...asegurado, nit: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* Bloque 2: Contrato */}
                        <div className="section-card p-6 rounded-2xl">
                            <h3 className="flex items-center gap-2 font-bold text-slate-700 mb-4 border-b pb-2 uppercase text-xs tracking-wider"><FileText size={18} /> Objeto y Valores</h3>
                            <div className="space-y-4">
                                <div><label className={labelCls}>Objeto del Contrato *</label><textarea className="soft-input w-full p-2 rounded-lg h-20 text-sm" value={contrato.objeto} onChange={e => setContrato({...contrato, objeto: e.target.value})}></textarea></div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div><label className={labelCls}>Valor SIN IVA</label><input type="text" className="soft-input w-full p-2 rounded-lg text-right font-bold" value={contrato.valorSinIva.toLocaleString('es-CO')} onChange={e => setContrato({...contrato, valorSinIva: parseCurrency(e.target.value)})} /></div>
                                    <div><label className={labelCls}>Duración (Días)</label><input type="number" className="soft-input w-full p-2 rounded-lg" value={contrato.duracion} onChange={e => setContrato({...contrato, duracion: e.target.value})} /></div>
                                    <div className="bg-slate-100 p-2 rounded-lg text-center"><label className={labelCls}>Valor CON IVA (19%)</label><p className="font-bold text-slate-600 text-sm">{formatCurrency(valorConIva)}</p></div>
                                </div>
                            </div>
                        </div>

                        {/* Tabla Amparos */}
                        <div className="section-card rounded-2xl overflow-hidden border border-slate-200">
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs text-left">
                                    <thead className="bg-[#12334F] text-white">
                                        <tr><th className="p-3">AMPARO</th><th className="p-3">VIGENCIA</th><th className="p-3 text-right">V. ASEGURADO</th><th className="p-3 text-right">PRIMA</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                        {amparos.map(a => (
                                            <tr key={a.id} className={a.activo ? "bg-cyan-50/50" : "hover:bg-slate-50 transition-colors"}>
                                                <td className="p-3 flex items-center gap-2"><input type="checkbox" className="w-4 h-4 rounded text-[#163f73] focus:ring-[#58C9E8]" checked={a.activo} onChange={() => handleAmparoToggle(a.id)} /> <span className={a.activo ? "font-bold text-[#163f73]" : ""}>{a.nombre}</span></td>
                                                <td className="p-3">
                                                    <div className="flex gap-1">
                                                        <input type="date" className="p-1 border rounded text-[10px] w-24 bg-white/50" value={a.desde} onChange={e => handleAmparoField(a.id, 'desde', e.target.value)} />
                                                        <input type="date" className="p-1 border rounded text-[10px] w-24 bg-white/50" value={a.hasta} onChange={e => handleAmparoField(a.id, 'hasta', e.target.value)} />
                                                    </div>
                                                </td>
                                                <td className="p-3"><input type="text" className="w-full text-right p-1 border rounded bg-white/50 font-medium" value={a.valorAsegurado.toLocaleString('es-CO')} onChange={e => handleAmparoField(a.id, 'valorAsegurado', parseCurrency(e.target.value))} /></td>
                                                <td className="p-3 text-right font-bold text-[#163f73]">{formatCurrency(a.prima)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Footer de Acción */}
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6 bg-[#12334F] p-8 rounded-3xl text-white shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-[#58C9E8] opacity-10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                            <div className="z-10"><p className="text-[10px] text-[#58C9E8] font-black tracking-widest uppercase mb-1">Gran Total Liquidado</p><h2 className="text-4xl font-black">{formatCurrency(totalG)}</h2></div>
                            <div className="flex flex-wrap gap-3 z-10">
                                <button onClick={exportarCotizacion} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-xl font-bold flex items-center gap-2 transition-all">RESUMEN</button>
                                <button onClick={imprimirPDF} className="px-6 py-3 bg-[#58C9E8] hover:bg-[#4ab8d6] text-[#12334F] rounded-xl font-black flex items-center gap-2 transition-all shadow-lg shadow-[#58C9E8]/20"><Printer size={18} /> PDF / IMPRIMIR</button>
                                <button onClick={enviarAegis} disabled={isSubmitting} className="px-10 py-3 bg-white text-[#12334F] hover:bg-slate-100 rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all border-b-4 border-slate-300 active:border-b-0 active:translate-y-1">
                                    {isSubmitting ? "ENVIANDO..." : <><Send size={18}/> ENVIAR A AEGIS</>}
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
