                                                        const isMenorUnDia = policy.ansHoras <= 24; const isAnulada = policy.estado === "Anulada" || policy.estado === "Cancelada";
                                                        return (
                                                            <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                                <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{policy.cliente}</div></td>
                                                                <td className="px-6 py-4"><div className="font-medium text-gray-700">{policy.asegurado}</div><div className="text-xs text-gray-400 mt-1">Doc: {policy.id}</div></td>
                                                                <td className="px-6 py-4"><div className="text-gray-600 mb-1">{policy.aseguradora}</div><span className="inline-flex items-center px-2 py-1 rounded text-[10px] font-bold bg-gray-100 text-gray-700 uppercase">{policy.ramo}</span></td>
                                                                <td className="px-6 py-4 text-center"><div className={`inline-flex flex-col items-center p-2 rounded-lg ${isMenorUnDia ? 'bg-[#e8f7fb]' : 'bg-orange-50'}`}><span className={`font-bold ${isMenorUnDia ? 'text-[#163f73]' : 'text-orange-700'}`}>{policy.ansHoras.toFixed(1)} h</span></div></td>
                                                                <td className="px-6 py-4"><span className={`inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-xs font-medium border ${isAnulada ? 'bg-red-50 text-red-700 border-red-200' : isMenorUnDia ? 'bg-green-50 text-green-700 border-green-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>{policy.estado}</span></td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 3: REPORTE CARTERA                                  */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'cartera' ? 'block p-4 md:p-8 pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm mb-6 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white/10 rounded-lg"><PieChart size={32} className="text-[#58C9E8]" strokeWidth={2} /></div>
                                        <div><h1 className="text-2xl font-bold tracking-wide">Reporte de Cartera</h1><p className="text-[#58C9E8] text-sm font-medium">FINANZAS Y RECAUDO</p></div>
                                    </div>
                                </div>

                                <div className="w-full max-w-[1600px] mx-auto space-y-8">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div>
                                            <h3 className="text-lg font-bold text-[#163f73] flex items-center gap-2"><UploadCloud size={20} className="text-[#58C9E8]"/> Cargar Cartera Contable</h3>
                                            <p className="text-sm text-gray-500">Actualiza las deudas y edades subiendo un archivo CSV.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            <button onClick={() => downloadTemplate('cartera')} className="px-4 py-2.5 text-sm font-medium text-[#163f73] bg-[#e8f7fb] rounded-lg border border-[#58C9E8]/30 hover:bg-[#d0f0fa] flex items-center gap-2"><Download size={16} /> Plantilla CSV</button>
                                            <label className="cursor-pointer px-4 py-2.5 text-sm font-medium text-white bg-[#163f73] rounded-lg hover:bg-[#12334F] flex items-center gap-2"><DollarSign size={16} /> Cargar Archivo<input type="file" accept=".csv" className="hidden" onChange={(e) => handleCsvUpload(e, 'cartera')} /></label>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-blue-50 rounded-lg text-[#163f73]"><FileText size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Pólizas Pendientes</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{cartTotal}</h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-[#e8f7fb] rounded-lg text-[#58C9E8]"><Calendar size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Antigüedad Promedio</p><h4 className="text-3xl font-bold text-[#163f73] mt-1">{cartPromedioDias} <span className="text-lg text-gray-500 font-normal">días</span></h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-orange-50 rounded-lg text-orange-500"><AlertCircle size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Valor Total Adeudado</p><h4 className="text-2xl font-bold text-[#12334F] mt-1">{formatCurrency(cartSumaTotal)}</h4></div>
                                        </div>
                                    </div>

                                    {/* TABLA RESUMEN TOMADOR */}
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mt-8">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                                            <h4 className="text-lg font-bold text-[#163f73]">Resumen por Tomador</h4>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                            <thead className="bg-gray-50 shadow-sm border-b border-gray-200">
                                                <tr className="text-gray-500 text-xs uppercase tracking-wider">
                                                <th className="px-6 py-4 font-semibold">Tomador</th>
                                                <th className="px-6 py-4 font-semibold text-center">Pólizas</th>
                                                <th className="px-6 py-4 font-semibold text-right">Valor Adeudado</th>
                                                <th className="px-6 py-4 font-semibold text-center">%</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 text-sm">
                                                {cartSummaryArray.map((item, idx) => (
                                                    <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                        <td className="px-6 py-4 font-bold text-[#12334F]">{item.tomador}</td>
                                                        <td className="px-6 py-4 text-center"><span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-[#e8f7fb] text-[#163f73] font-bold">{item.count}</span></td>
                                                        <td className="px-6 py-4 text-right font-bold">{formatCurrency(item.total)}</td>
                                                        <td className="px-6 py-4 text-center"><div className="w-full bg-gray-200 rounded-full h-2 mt-1"><div className="bg-[#58C9E8] h-2 rounded-full" style={{ width: `${(item.total / cartSumaTotal * 100).toFixed(1)}%` }}></div></div></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50"><h4 className="text-lg font-bold text-[#163f73]">Detalle de Facturación Pendiente</h4></div>
                                        <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                                            <table className="w-full text-left border-collapse min-w-[900px]">
                                                <thead className="bg-gray-50 shadow-sm border-b border-gray-200 text-gray-500 text-xs uppercase tracking-wider">
                                                    <tr><th className="px-6 py-4 font-semibold">Tomador / Cliente</th><th className="px-6 py-4 font-semibold">Beneficiario / Ramo</th><th className="px-6 py-4 font-semibold text-center">Nº Póliza</th><th className="px-6 py-4 font-semibold text-center">Días Cartera</th><th className="px-6 py-4 font-semibold text-right">Valor Total</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 text-sm">
                                                    {carteraData.sort((a,b) => b.dias - a.dias).map((policy, idx) => {
                                                        const isAntigua = policy.dias > 15;
                                                        return (
                                                            <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                                <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{policy.tomador}</div></td>
                                                                <td className="px-6 py-4"><div className="text-gray-600 truncate max-w-xs">{policy.beneficiario}</div><div className="text-[10px] uppercase font-bold text-gray-400 mt-1">{policy.ramo}</div></td>
                                                                <td className="px-6 py-4 text-center"><span className="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-700">{policy.poliza}</span></td>
                                                                <td className="px-6 py-4 text-center"><div className={`inline-flex items-center justify-center w-10 h-10 rounded-full font-bold ${isAntigua ? 'bg-orange-100 text-orange-700' : 'bg-[#e8f7fb] text-[#163f73]'}`}>{policy.dias}</div></td>
                                                                <td className="px-6 py-4 text-right"><span className="font-bold text-[#12334F] text-base">{formatCurrency(policy.total)}</span></td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* VISTAS EN CONSTRUCCIÓN */}
                            <div className={['inicio', 'soporte'].includes(activeMenu) ? 'flex h-full items-center justify-center p-6' : 'hidden'}>
                                <div className="bg-white rounded-xl border border-gray-200 border-dashed w-full max-w-2xl p-12 text-center shadow-sm">
                                    <Shield size={64} className="mx-auto text-[#58C9E8] mb-4 opacity-50" />
                                    <h2 className="text-2xl font-bold text-[#163f73]">Módulo en construcción</h2>
                                    <p className="text-gray-500 mt-2">Esta sección ({menuItems.find(m => m.id === activeMenu)?.label}) estará disponible próximamente en su portal.</p>
                                </div>
                            </div>

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
