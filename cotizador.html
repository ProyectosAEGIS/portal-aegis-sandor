            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

                        return { ...amp, activo: isActivating, desde: newDesde, hasta: newHasta, dias: newDias, porcentaje: isActivating ? amp.porcentaje : '', valorAsegurado: isActivating ? amp.valorAsegurado : 0, valorAseguradoStr: isActivating ? amp.valorAseguradoStr : '', prima: isActivating ? amp.prima : 0 };

                            <svg class="animate-spin h-12 w-12 text-[#163f73] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <h3 class="text-xl font-bold text-[#163f73]">Generando Orden de Servicio...</h3>
                            <p class="text-gray-500 text-sm mt-2">Preparando archivos adjuntos y finalizando cotización</p>
                        `;
                        document.body.appendChild(cortina);
                        
                        // Obligamos al navegador a subir la ventana (html2canvas lo requiere)
                        window.scrollTo(0, 0);
                        
                        // Pausa de medio segundo para que el navegador pinte todos los colores
                        await new Promise(resolve => setTimeout(resolve, 600));
                        
                        const opt = {
                            margin:       10,
                            filename:     `${consecutivo}_Orden_Servicio.pdf`,
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2, logging: false, useCORS: true, scrollY: 0 },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
                        };
                        
                        // Tomamos la "foto" del documento visible
                        const pdfDataUri = await html2pdf().set(opt).from(tempDiv).outputPdf('datauristring');
                        const pdfBase64 = pdfDataUri.split(',')[1];
                        
                        // Limpiamos la pantalla: Borramos el doc y la cortina
                        document.body.removeChild(tempDiv); 
                        document.body.removeChild(cortina);
                        
                        if (pdfBase64) {
                            attachments.push({
                                name: `${consecutivo} - Orden de Servicio.pdf`,
                                contentBytes: pdfBase64
                            });
                        }
                    } catch (pdfError) {
                        console.error("Error al generar PDF automático:", pdfError);
                        if(document.getElementById('cortina-pdf')) {
                            document.body.removeChild(document.getElementById('cortina-pdf'));
                        }
                    }
                    // ----------------------------------------------------

                    const amparosDetalleExcel = amparos.filter(a => a.activo).map(a => 
                        `${a.nombre} | Vig: ${a.desde || '-'} a ${a.hasta || '-'} (${a.dias} d) | % Asegurado: ${a.porcentaje||'0'}% | V.Aseg: ${formatCurrency(a.valorAsegurado)} | Tasa: ${a.tasa}% | Prima: ${formatCurrency(a.prima)}`
                    ).join('\n');

                    const payload = {
                        fechaRegistro: new Date().toLocaleString('es-CO'),
                        consecutivo, 
                        solicitanteNombre: interno.solicitante, solicitanteEmail: interno.solicitanteEmail, asunto: interno.asunto,
                        tiposSolicitud: Object.keys(interno.tipos).filter(k => interno.tipos[k]).join(', '),
                        tomadorNombre: tomador.nombre, tomadorNit: tomador.nit, tomadorDireccion: tomador.direccion, tomadorTelefono: tomador.telefono, tomadorEmail: tomador.email,
                        aseguradoNombre: asegurado.nombre, aseguradoNit: asegurado.nit,
                        contratoObjeto: contrato.objeto, contratoNumero: contrato.numero, contratoValorSinIva: valorSinIva, contratoValorConIva: valorConIva, contratoValorSinIvaFormateado: formatCurrency(valorSinIva), contratoValorConIvaFormateado: formatCurrency(valorConIva), contratoDuracionDias: contrato.duracion,
                        amparosDetalleExcel, 
                        primaCumplimiento: primaCumplimiento, 
                        gastosCumplimiento: gastosCalculadosCump, 
                        ivaCumplimiento: ivaCump, 
                        valorTotalCumplimiento: formatCurrency(totalCump), 
                        primaRCE: primaRCE, 
                        gastosRCE: gastosCalculadosRCE, 
                        ivaRCE: ivaRCE, 
                        valorTotalRCE: formatCurrency(totalRCE), 
                        granTotal: totalGeneral,
                        valorGranTotal: formatCurrency(totalGeneral), 
                        adjuntos: attachments
                    };

                    const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (res.ok) { 
                        alert("✅ Solicitud enviada con éxito. La Orden de Servicio fue anexada correctamente."); 
                        setConsecutivo(generarConsecutivoLocal()); 
                        limpiarFormularioCotizador();
                    } else { throw new Error(res.status); }
                } catch (e) { alert("❌ Error: " + e.message); } finally { setIsSubmitting(false); }
            };

            // --- FUNCIONES DE REPORTES CSV ---
            const downloadTemplate = (type) => {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                if (type === 'produccion') csvContent += "Cliente;Poliza;Aseguradora;Asegurado;Ramo;HorasANS;Estado;ValorPrima\nGrupo Sandor;12345;Mundial;Alcaldia;Cumplimiento;4.5;Completado;1500000";
                else csvContent += "Tomador;Beneficiario;Ramo;Poliza;DiasCartera;ValorTotal\nGrupo Sandor;Alcaldia;Cumplimiento;12345;12;2500000";
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `Plantilla_AEGIS_${type}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleCsvUpload = (e, type) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result; const rows = text.split('\n').filter(r => r.trim());
                    if(rows.length < 2) return alert("El archivo está vacío o sin formato.");
                    const sep = text.includes(';') ? ';' : ',';
                    if (type === 'produccion') {
                        setProduccionData(rows.slice(1).map(row => {
                            const cols = row.split(sep);
                            return { cliente: cols[0]?.trim() || '-', id: cols[1]?.trim() || '-', aseguradora: cols[2]?.trim() || '-', asegurado: cols[3]?.trim() || '-', ramo: cols[4]?.trim() || '-', ansHoras: parseFloat(cols[5]) || 0, estado: cols[6]?.trim() || '-', valor: parseFloat(cols[7]) || 0 };
                        }));
                    } else {
                        setCarteraData(rows.slice(1).map(row => {
                            const cols = row.split(sep);
                            return { tomador: cols[0]?.trim() || '-', beneficiario: cols[1]?.trim() || '-', ramo: cols[2]?.trim() || '-', poliza: cols[3]?.trim() || '-', dias: parseInt(cols[4]) || 0, total: parseFloat(cols[5]) || 0 };
                        }));
                    }
                    e.target.value = '';
                };
                reader.readAsText(file, 'UTF-8');
            };

            // Cálculos Producción
            const prodTotal = produccionData.length;
            const prodMenorUnDia = produccionData.filter(p => p.ansHoras <= 24).length;
            const prodPorcentaje = prodTotal > 0 ? Math.round((prodMenorUnDia / prodTotal) * 100) : 0;
            const prodMediana = getMedian(produccionData.map(p => p.ansHoras)).toFixed(1);
            const prodTotalValor = produccionData.reduce((acc, curr) => acc + curr.valor, 0);
            
            const prodSummary = produccionData.reduce((acc, curr) => {
                if (!acc[curr.cliente]) acc[curr.cliente] = { count: 0, totalValor: 0 };
                acc[curr.cliente].count += 1; acc[curr.cliente].totalValor += curr.valor;
                return acc;
            }, {});
            const prodSummaryArray = Object.keys(prodSummary).map(k => ({ cliente: k, ...prodSummary[k] })).sort((a, b) => b.totalValor - a.totalValor);

            // Cálculos Cartera
            const cartTotal = carteraData.length;
            const cartSumaTotal = carteraData.reduce((acc, curr) => acc + curr.total, 0);
            const cartSana = carteraData.filter(p => p.dias <= 15).reduce((acc, curr) => acc + curr.total, 0);
            const cartAntigua = carteraData.filter(p => p.dias > 15).reduce((acc, curr) => acc + curr.total, 0);
            const cartPorcentajeSana = cartSumaTotal > 0 ? ((cartSana / cartSumaTotal) * 100).toFixed(1) : 0;
            const cartPromedioDias = cartTotal > 0 ? (carteraData.reduce((acc, curr) => acc + curr.dias, 0) / cartTotal).toFixed(1) : 0;

            const cartSummary = carteraData.reduce((acc, curr) => {
                if (!acc[curr.tomador]) acc[curr.tomador] = { count: 0, total: 0 };
                acc[curr.tomador].count += 1; acc[curr.tomador].total += curr.total;
                return acc;
            }, {});
            const cartSummaryArray = Object.keys(cartSummary).map(k => ({ tomador: k, ...cartSummary[k] })).sort((a, b) => b.total - a.total);

            // Estilos comunes
            const inputCls = "w-full p-2.5 soft-input text-[#12334F] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#58C9E8] transition-all text-sm";
            const labelCls = "block text-xs font-bold text-[#5c7792] uppercase tracking-wider mb-1.5";
            const sectionCls = "bg-white rounded-xl p-6 shadow-sm border border-[#dce4ec] mb-6";

            return (
                <div className="fixed inset-0 flex bg-[#e6edf3] overflow-hidden w-full h-full">
                    
                    {/* SIDEBAR CORPORATIVO */}
                    <aside className={`fixed inset-y-0 left-0 bg-[#12334F] w-64 text-white flex flex-col transition-transform duration-300 z-40 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="h-20 flex items-center px-6 border-b border-white/10 bg-[#0e273d] flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="p-1.5 bg-gradient-to-br from-[#58C9E8] to-[#163f73] rounded-lg shadow-lg">
                                    <Shield size={28} className="text-white" strokeWidth={2.5} />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-wide uppercase leading-tight">AEGIS</h1>
                                    <p className="text-[#58C9E8] text-[10px] font-medium tracking-widest uppercase">Insurance</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            <p className="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Menú Principal</p>
                            {menuItems.map(item => {
                                const Icon = item.icon;
                                const isActive = activeMenu === item.id;
                                return (
                                    <button 
                                        key={item.id}
                                        onClick={() => { setActiveMenu(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-all text-sm font-medium ${
                                            isActive ? 'bg-gradient-to-r from-[#163f73] to-[#12334F] border border-[#58C9E8]/30 text-white shadow-md' : 'text-gray-300 hover:bg-white/5 hover:text-white'
                                        }`}
                                    >
                                        <Icon size={18} className={isActive ? 'text-[#58C9E8]' : 'text-gray-400'} />
                                        {item.label}
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="p-4 border-t border-white/10 bg-[#0e273d] flex-shrink-0">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-[#58C9E8] flex items-center justify-center text-[#12334F] font-bold text-sm">GS</div>
                                <div className="text-left flex-1">
                                    <p className="text-sm font-semibold text-white leading-tight">Grupo Sandor</p>
                                    <p className="text-xs text-[#58C9E8]">Cliente Corporativo</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    {/* CONTENEDOR PRINCIPAL */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        
                        <header className="h-20 bg-white shadow-sm border-b border-gray-200 flex items-center justify-between px-4 sm:px-8 z-10 flex-shrink-0">
                            <div className="flex items-center gap-4">
                                <button className="md:hidden text-gray-500 hover:text-[#163f73] p-1" onClick={() => setIsMobileMenuOpen(true)}>
                                    <MenuIcon size={26} />
                                </button>
                                <h2 className="text-xl font-bold text-[#163f73] hidden sm:block">Portal de Servicios AEGIS</h2>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm text-gray-500 font-medium hidden md:block">
                                    {new Date().toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </span>
                                <div className="w-px h-6 bg-gray-300 hidden md:block"></div>
                                <button className="relative p-2 text-gray-400 hover:text-[#163f73] transition-colors rounded-full hover:bg-gray-100"><Bell size={20} /></button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto bg-[#e6edf3] relative w-full">
                            
                            {/* ========================================================= */}
                            {/* VISTA 1: COTIZADOR                                        */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'cotizador' ? 'block p-4 md:p-8 pb-20' : 'hidden'}>
                                
                                {/* Header Cotizador */}
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm rounded-xl flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white/10 rounded-lg"><Calculator size={32} className="text-[#58C9E8]" /></div>
                                        <div><h1 className="text-2xl font-bold tracking-wide">Módulo de Cotización</h1><p className="text-[#58C9E8] text-sm">CUMPLIMIENTO & RCE</p></div>
                                    </div>
                                    <div className="text-right hidden md:block"><p className="text-xs text-gray-300">ID SOLICITUD</p><p className="font-mono font-bold text-xl">{consecutivo}</p></div>
                                </div>

                                <div className="max-w-[1600px] mx-auto space-y-6">
                                    {/* Bloque 0: Solicitante */}
                                    <div className={sectionCls}>
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><User size={20} className="text-[#58C9E8]" /> 0. Datos del Solicitante</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div><label className={labelCls}>Nombre Solicitante *</label><input type="text" className={inputCls} value={interno.solicitante} onChange={e => setInterno({...interno, solicitante: e.target.value})} /></div>
                                            <div><label className={labelCls}>Correo Electrónico *</label><input type="email" className={inputCls} value={interno.solicitanteEmail} onChange={e => setInterno({...interno, solicitanteEmail: e.target.value})} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Asunto / Proyecto</label><input type="text" className={inputCls} value={interno.asunto} onChange={e => setInterno({...interno, asunto: e.target.value})} /></div>
                                        </div>
                                        <div className="mt-4 mb-4">
                                            <label className={labelCls}>Tipo de Solicitud</label>
                                            <div className="flex flex-wrap gap-4 mt-2">
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.garantiaUnica} onChange={() => handleCheckboxTipos('garantiaUnica')} />Garantía Única</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.cumplimientoParticulares} onChange={() => handleCheckboxTipos('cumplimientoParticulares')} />Cumplimiento Particulares</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.cumplimientoEstatales} onChange={() => handleCheckboxTipos('cumplimientoEstatales')} />Cumplimiento Estatales</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.disposicionLegal} onChange={() => handleCheckboxTipos('disposicionLegal')} />Disposición Legal</label>
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-[#58C9E8] rounded" checked={interno.tipos.otros} onChange={() => handleCheckboxTipos('otros')} />Otros</label>
                                            </div>
                                        </div>
                                        <div className="bg-[#eef3f8] p-4 rounded-lg border border-[#cdd7e0]">
                                            <label className={labelCls}>Soportes y Contratos (PDF)</label>
                                            <div className="flex items-center gap-3 mt-2">
                                                <label className="cursor-pointer bg-white px-4 py-2 border border-[#cdd7e0] rounded-md text-sm font-medium hover:bg-gray-50 flex items-center gap-2 shadow-sm">
                                                    <Paperclip size={16} className="text-[#5c7792]" /> Seleccionar Archivos
                                                    <input type="file" multiple className="sr-only" onChange={handleFileChange} />
                                                </label>
                                                <span className="text-sm text-[#5c7792]">{interno.archivos.length === 0 ? "Ningún archivo" : `${interno.archivos.length} archivo(s)`}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Bloque 1: Tomador */}
                                    <div className={sectionCls}>
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><Building size={20} className="text-[#58C9E8]" /> 1. Tomador y Asegurado</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div><label className={labelCls}>Tomador Razón Social *</label><input type="text" className={inputCls} value={tomador.nombre} onChange={e => setTomador({...tomador, nombre: e.target.value})} /></div>
                                            <div><label className={labelCls}>Tomador NIT *</label><input type="text" className={inputCls} value={tomador.nit} onChange={e => setTomador({...tomador, nit: e.target.value})} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Dirección Tomador</label><input type="text" className={inputCls} value={tomador.direccion} onChange={e => setTomador({...tomador, direccion: e.target.value})} /></div>
                                            <div><label className={labelCls}>Teléfono / Celular</label><input type="text" className={inputCls} value={tomador.telefono} onChange={e => setTomador({...tomador, telefono: e.target.value})} /></div>
                                            <div><label className={labelCls}>E-mail</label><input type="email" className={inputCls} value={tomador.email} onChange={e => setTomador({...tomador, email: e.target.value})} /></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-dashed border-[#dce4ec]">
                                            <div><label className={labelCls}>Asegurado Razón Social *</label><input type="text" className={inputCls} value={asegurado.nombre} onChange={e => setAsegurado({...asegurado, nombre: e.target.value})} /></div>
                                            <div><label className={labelCls}>Asegurado NIT</label><input type="text" className={inputCls} value={asegurado.nit} onChange={e => setAsegurado({...asegurado, nit: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    {/* Bloque 2: Contrato */}
                                    <div className={sectionCls}>
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><FileText size={20} className="text-[#58C9E8]" /> 2. Datos del Contrato</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-6 gap-4">
                                            <div className="md:col-span-6"><label className={labelCls}>Objeto del Contrato *</label><textarea maxLength="2000" className={`${inputCls} h-20`} value={contrato.objeto} onChange={e => setContrato({...contrato, objeto: e.target.value})}></textarea></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Número</label><input type="text" className={inputCls} value={contrato.numero} onChange={e => setContrato({...contrato, numero: e.target.value})} /></div>
                                            <div className="md:col-span-2">
                                                <label className={labelCls}>Valor CON IVA *</label>
                                                <div className="relative">
                                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                                    <input type="text" className={`${inputCls} pl-8`} value={contrato.valorConIva?contrato.valorConIva.toLocaleString('es-CO'):''} onChange={e => setContrato({...contrato, valorConIva: parseCurrency(e.target.value)})} />
                                                </div>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className={labelCls}>Valor SIN IVA</label>
                                                <div className="relative">
                                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none opacity-70">$</span>
                                                    <input type="text" className={`${inputCls} bg-[#e4ebf1] font-semibold pl-8 cursor-not-allowed`} disabled value={valorSinIva ? valorSinIva.toLocaleString('es-CO', {maximumFractionDigits: 0}) : '0'} />
                                                </div>
                                            </div>
                                            <div className="md:col-span-2"><label className={labelCls}>Desde</label><input type="date" className={inputCls} value={contrato.desde} onChange={e => {
                                                const newDesde = e.target.value; let newDuracion = contrato.duracion;
                                                if (newDesde && contrato.hasta) { newDuracion = Math.ceil((new Date(contrato.hasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24)) > 0 ? Math.ceil((new Date(contrato.hasta) - new Date(newDesde)) / (1000 * 60 * 60 * 24)) : 0; }
                                                setContrato({...contrato, desde: newDesde, duracion: newDuracion});
                                            }} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Hasta</label><input type="date" className={inputCls} value={contrato.hasta} onChange={e => {
                                                const newHasta = e.target.value; let newDuracion = contrato.duracion;
                                                if (contrato.desde && newHasta) { newDuracion = Math.ceil((new Date(newHasta) - new Date(contrato.desde)) / (1000 * 60 * 60 * 24)) > 0 ? Math.ceil((new Date(newHasta) - new Date(contrato.desde)) / (1000 * 60 * 60 * 24)) : 0; }
                                                setContrato({...contrato, hasta: newHasta, duracion: newDuracion});
                                            }} /></div>
                                            <div className="md:col-span-2"><label className={labelCls}>Duración (Días)</label><input type="number" className={`${inputCls} bg-[#e4ebf1] font-semibold cursor-not-allowed`} disabled value={contrato.duracion} /></div>
                                        </div>
                                    </div>

                                    {/* Bloque 3: Amparos */}
                                    <div className={sectionCls}>
                                        <h3 className="flex items-center gap-2 font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2"><Calculator size={20} className="text-[#58C9E8]" /> 3. Amparos y Garantías</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-xs text-left min-w-[1000px]">
                                                <thead className="bg-[#12334F] text-white">
                                                    <tr>
                                                        <th className="p-3 rounded-tl-lg">AMPARO</th>
                                                        <th className="p-3 w-64">VIGENCIA (DESDE - HASTA)</th>
                                                        <th className="p-3 text-center w-16">DÍAS</th>
                                                        <th className="p-3 text-center w-24">% Vr. Aseg.</th>
                                                        <th className="p-3 text-right w-44">VALOR ASEGURADO</th>
                                                        <th className="p-3 text-center w-20">TASA %</th>
                                                        <th className="p-3 text-right w-40 rounded-tr-lg">PRIMA</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-200">
                                                    {amparos.map(a => (
                                                        <tr key={a.id} className={a.activo ? "bg-cyan-50/50" : "hover:bg-slate-50 transition-colors"}>
                                                            <td className="p-3 flex items-center gap-2">
                                                                <input type="checkbox" className="w-4 h-4 rounded text-[#163f73]" checked={a.activo} onChange={() => handleAmparoToggle(a.id)} />
                                                                <span className={a.activo ? "font-bold text-[#163f73]" : ""}>{a.nombre}</span>
                                                            </td>
                                                            <td className="p-3">
                                                                <div className="flex gap-1">
                                                                    <input type="date" className="p-1 border border-[#cdd7e0] rounded w-full bg-white/50 focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.desde} onChange={e => handleAmparoField(a.id, 'desde', e.target.value)} />
                                                                    <input type="date" className="p-1 border border-[#cdd7e0] rounded w-full bg-white/50 focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.hasta} onChange={e => handleAmparoField(a.id, 'hasta', e.target.value)} />
                                                                </div>
                                                            </td>
                                                            <td className="p-3 text-center font-bold text-slate-500">{a.dias || '-'}</td>
                                                            <td className="p-3">
                                                                <input type="text" placeholder="%" className="w-full text-center p-1 border border-[#cdd7e0] rounded bg-white/50 font-semibold focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.porcentaje} onChange={e => handleAmparoField(a.id, 'porcentaje', e.target.value)} />
                                                            </td>
                                                            <td className="p-3">
                                                                <div className="relative flex items-center">
                                                                    <span className={`absolute left-2 text-[#5c7792] font-bold text-sm pointer-events-none ${!a.activo && 'opacity-50'}`}>$</span>
                                                                    <input type="text" className="w-full pl-6 text-right p-1 border border-[#cdd7e0] rounded bg-white/50 font-medium focus:outline-none focus:ring-1 focus:ring-[#58C9E8] disabled:opacity-50" disabled={!a.activo} value={a.valorAseguradoStr !== undefined ? a.valorAseguradoStr : (a.valorAsegurado ? a.valorAsegurado.toLocaleString('es-CO',{minimumFractionDigits:0, maximumFractionDigits:2}) : '')} onChange={e => handleAmparoField(a.id, 'valorAsegurado', e.target.value)} />
                                                                </div>
                                                            </td>
                                                            <td className="p-3">
                                                                <input type="text" className="w-full text-center p-1 border border-[#cdd7e0] rounded bg-slate-100 font-semibold text-[#5c7792] cursor-not-allowed" disabled value={a.tasa} onChange={e => handleAmparoField(a.id, 'tasa', e.target.value)} />
                                                            </td>
                                                            <td className="p-3 text-right font-bold text-[#163f73]">{formatCurrency(a.prima)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Bloque 4: Ajustes y Totales */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className={sectionCls}>
                                            <h3 className="font-bold text-[#163f73] mb-4 border-b border-[#dce4ec] pb-2">Ajustes Adicionales</h3>
                                            <div className="space-y-4">
                                                <div>
                                                    <label className={labelCls}>Gastos Cumplimiento</label>
                                                    <div className="relative">
                                                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                                        <input type="text" className={`${inputCls} pl-8`} value={costos.gastosCump?costos.gastosCump.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosCump: parseCurrency(e.target.value)})} />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className={labelCls}>Gastos RCE</label>
                                                    <div className="relative">
                                                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#5c7792] font-bold pointer-events-none">$</span>
                                                        <input type="text" className={`${inputCls} pl-8`} value={costos.gastosRCE?costos.gastosRCE.toLocaleString('es-CO'):''} onChange={e => setCostos({...costos, gastosRCE: parseCurrency(e.target.value)})} />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-[#12334F] rounded-xl p-6 shadow-lg border border-[#163f73] text-white">
                                            <h3 className="font-bold text-[#58C9E8] mb-4">Liquidación Final</h3>
                                            <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                                <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1 text-sm">Póliza de Cumplimiento</h4>
                                                <div className="space-y-1 text-sm text-gray-300">
                                                    <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaCumplimiento)}</span></div>
                                                    <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosCump)}</span></div>
                                                    <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaCump)}</span></div>
                                                    <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                                        <span>Total Cumplimiento:</span> <span>{formatCurrency(totalCump)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-[#163f73] rounded-lg p-4 shadow-sm mb-3">
                                                <h4 className="font-bold text-white mb-2 border-b border-[#12334F] pb-1 text-sm">Póliza de Responsabilidad Civil (RCE)</h4>
                                                <div className="space-y-1 text-sm text-gray-300">
                                                    <div className="flex justify-between"><span>Prima:</span> <span>{formatCurrency(primaRCE)}</span></div>
                                                    <div className="flex justify-between"><span>Gastos de Expedición:</span> <span>{formatCurrency(gastosCalculadosRCE)}</span></div>
                                                    <div className="flex justify-between"><span>IVA ({costos.tasaIva}%):</span> <span>{formatCurrency(ivaRCE)}</span></div>
                                                    <div className="flex justify-between font-bold text-[#58C9E8] pt-1 border-t border-[#12334F] mt-1">
                                                        <span>Total RCE:</span> <span>{formatCurrency(totalRCE)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Footer de Acción */}
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-6 bg-[#12334F] p-8 rounded-3xl text-white shadow-2xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#58C9E8] opacity-10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                                        <div className="z-10">
                                            <p className="text-[10px] text-[#58C9E8] font-black tracking-widest uppercase mb-1">Gran Total Liquidado (IVA Inc.)</p>
                                            <h2 className="text-4xl font-black">{formatCurrency(totalGeneral)}</h2>
                                        </div>
                                        <div className="flex flex-wrap gap-3 z-10">
                                            <button onClick={limpiarFormularioCotizador} className="px-4 py-3 bg-white/10 hover:bg-red-500/20 text-white rounded-xl font-bold transition-all"><Trash2 size={18} /></button>
                                            <button onClick={exportarCotizacion} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-xl font-bold flex items-center gap-2 transition-all border border-white/20">RESUMEN</button>
                                            <button onClick={imprimirCotizacion} className="px-6 py-3 bg-[#e8f7fb] text-[#163f73] hover:bg-[#d0f0fa] rounded-xl font-bold flex items-center gap-2 border border-[#58C9E8]"><Printer size={18} /> PDF</button>
                                            <button onClick={enviarAegis} disabled={isSubmitting} className="px-10 py-3 bg-[#58C9E8] text-[#12334F] hover:bg-[#4dbddb] rounded-xl font-black flex items-center gap-2 shadow-xl disabled:opacity-50 transition-all">
                                                {isSubmitting ? "ENVIANDO..." : <><Send size={18}/> ENVIAR A AEGIS</>}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 2: REPORTE PRODUCCIÓN                               */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'produccion' ? 'block pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm mb-6 md:m-4 md:mb-6 md:rounded-xl flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white/10 rounded-lg"><TrendingUp size={32} className="text-[#58C9E8]" strokeWidth={2} /></div>
                                        <div><h1 className="text-2xl font-bold tracking-wide">Reporte de Producción y ANS</h1><p className="text-[#58C9E8] text-sm font-medium">MÉTRICAS OPERATIVAS</p></div>
                                    </div>
                                </div>

                                <div className="w-full px-4 sm:px-6 lg:px-8 max-w-[1600px] mx-auto space-y-8">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div>
                                            <h3 className="text-lg font-bold text-[#163f73] flex items-center gap-2"><UploadCloud size={20} className="text-[#58C9E8]"/> Actualizar Datos del Reporte</h3>
                                            <p className="text-sm text-gray-500">Carga un archivo CSV para actualizar las gráficas en tiempo real.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            <button onClick={() => downloadTemplate('produccion')} className="px-4 py-2.5 text-sm font-medium text-[#163f73] bg-[#e8f7fb] rounded-lg border border-[#58C9E8]/30 hover:bg-[#d0f0fa] flex items-center gap-2"><Download size={16} /> Plantilla CSV</button>
                                            <label className="cursor-pointer px-4 py-2.5 text-sm font-medium text-white bg-[#163f73] rounded-lg hover:bg-[#12334F] flex items-center gap-2"><FileText size={16} /> Cargar Archivo<input type="file" accept=".csv" className="hidden" onChange={(e) => handleCsvUpload(e, 'produccion')} /></label>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-blue-50 rounded-lg text-[#163f73]"><FileText size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Total Solicitudes</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{prodTotal}</h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-[#e8f7fb] rounded-lg text-[#58C9E8]"><CheckCircle size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Entregas &lt; 24 Horas</p><h4 className="text-3xl font-bold text-[#163f73] mt-1">{prodMenorUnDia} <span className="text-lg text-gray-500 font-normal">({prodPorcentaje}%)</span></h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-indigo-50 rounded-lg text-indigo-600"><ClockIcon size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Mediana ANS</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{prodMediana} <span className="text-lg text-gray-500 font-normal">hrs</span></h4></div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50"><h4 className="text-lg font-bold text-[#163f73]">Registro Detallado</h4></div>
                                        <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                                            <table className="w-full text-left border-collapse min-w-[900px]">
                                                <thead className="sticky top-0 bg-gray-50 z-10 shadow-sm text-gray-500 text-xs uppercase tracking-wider">
                                                    <tr><th className="px-6 py-4 font-semibold">Cliente</th><th className="px-6 py-4 font-semibold">Asegurado / Póliza</th><th className="px-6 py-4 font-semibold">Aseguradora / Ramo</th><th className="px-6 py-4 font-semibold text-center">Tiempo ANS</th><th className="px-6 py-4 font-semibold">Estado</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 text-sm">
                                                    {produccionData.map((policy, idx) => {
                                                        const isMenorUnDia = policy.ansHoras <= 24; const isAnulada = policy.estado === "Anulada" || policy.estado === "Cancelada";
                                                        return (
                                                            <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                                <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{policy.cliente}</div></td>
                                                                <td className="px-6 py-4"><div className="font-medium text-gray-700">{policy.asegurado}</div><div className="text-xs text-gray-400 mt-1">Doc: {policy.id}</div></td>
                                                                <td className="px-6 py-4"><div className="text-gray-600 mb-1">{policy.aseguradora}</div><span className="inline-flex items-center px-2 py-1 rounded text-[10px] font-bold bg-gray-100 text-gray-700 uppercase">{policy.ramo}</span></td>
                                                                <td className="px-6 py-4 text-center"><div className={`inline-flex flex-col items-center p-2 rounded-lg ${isMenorUnDia ? 'bg-[#e8f7fb]' : 'bg-orange-50'}`}><span className={`font-bold ${isMenorUnDia ? 'text-[#163f73]' : 'text-orange-700'}`}>{policy.ansHoras.toFixed(1)} h</span></div></td>
                                                                <td className="px-6 py-4"><span className={`inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-xs font-medium border ${isAnulada ? 'bg-red-50 text-red-700 border-red-200' : isMenorUnDia ? 'bg-green-50 text-green-700 border-green-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>{policy.estado}</span></td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTA 3: REPORTE CARTERA                                  */}
                            {/* ========================================================= */}
                            <div className={activeMenu === 'cartera' ? 'block pb-20' : 'hidden'}>
                                <div className="bg-[#163f73] text-white py-6 px-8 shadow-sm mb-6 md:m-4 md:mb-6 md:rounded-xl flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white/10 rounded-lg"><PieChart size={32} className="text-[#58C9E8]" strokeWidth={2} /></div>
                                        <div><h1 className="text-2xl font-bold tracking-wide">Reporte de Cartera</h1><p className="text-[#58C9E8] text-sm font-medium">FINANZAS Y RECAUDO</p></div>
                                    </div>
                                </div>

                                <div className="w-full px-4 sm:px-6 lg:px-8 max-w-[1600px] mx-auto space-y-8">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div>
                                            <h3 className="text-lg font-bold text-[#163f73] flex items-center gap-2"><UploadCloud size={20} className="text-[#58C9E8]"/> Cargar Cartera Contable</h3>
                                            <p className="text-sm text-gray-500">Actualiza las deudas y edades subiendo un archivo CSV.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            <button onClick={() => downloadTemplate('cartera')} className="px-4 py-2.5 text-sm font-medium text-[#163f73] bg-[#e8f7fb] rounded-lg border border-[#58C9E8]/30 hover:bg-[#d0f0fa] flex items-center gap-2"><Download size={16} /> Plantilla CSV</button>
                                            <label className="cursor-pointer px-4 py-2.5 text-sm font-medium text-white bg-[#163f73] rounded-lg hover:bg-[#12334F] flex items-center gap-2"><DollarSign size={16} /> Cargar Archivo<input type="file" accept=".csv" className="hidden" onChange={(e) => handleCsvUpload(e, 'cartera')} /></label>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-blue-50 rounded-lg text-[#163f73]"><FileText size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Pólizas Pendientes</p><h4 className="text-3xl font-bold text-[#12334F] mt-1">{cartTotal}</h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-[#e8f7fb] rounded-lg text-[#58C9E8]"><Calendar size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Antigüedad Promedio</p><h4 className="text-3xl font-bold text-[#163f73] mt-1">{cartPromedioDias} <span className="text-lg text-gray-500 font-normal">días</span></h4></div>
                                        </div>
                                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start gap-4">
                                            <div className="p-3 bg-orange-50 rounded-lg text-orange-500"><AlertCircle size={28} /></div>
                                            <div><p className="text-sm text-gray-500 font-medium">Valor Total Adeudado</p><h4 className="text-2xl font-bold text-[#12334F] mt-1">{formatCurrency(cartSumaTotal)}</h4></div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50"><h4 className="text-lg font-bold text-[#163f73]">Detalle de Facturación Pendiente</h4></div>
                                        <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                                            <table className="w-full text-left border-collapse min-w-[900px]">
                                                <thead className="bg-gray-50 shadow-sm border-b border-gray-200 text-gray-500 text-xs uppercase tracking-wider">
                                                    <tr><th className="px-6 py-4 font-semibold">Tomador / Cliente</th><th className="px-6 py-4 font-semibold">Beneficiario / Ramo</th><th className="px-6 py-4 font-semibold text-center">Nº Póliza</th><th className="px-6 py-4 font-semibold text-center">Días Cartera</th><th className="px-6 py-4 font-semibold text-right">Valor Total</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 text-sm">
                                                    {carteraData.sort((a,b) => b.dias - a.dias).map((policy, idx) => {
                                                        const isAntigua = policy.dias > 15;
                                                        return (
                                                            <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                                <td className="px-6 py-4"><div className="font-bold text-[#12334F]">{policy.tomador}</div></td>
                                                                <td className="px-6 py-4"><div className="text-gray-600 truncate max-w-xs">{policy.beneficiario}</div><div className="text-[10px] uppercase font-bold text-gray-400 mt-1">{policy.ramo}</div></td>
                                                                <td className="px-6 py-4 text-center"><span className="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-700">{policy.poliza}</span></td>
                                                                <td className="px-6 py-4 text-center"><div className={`inline-flex items-center justify-center w-10 h-10 rounded-full font-bold ${isAntigua ? 'bg-orange-100 text-orange-700' : 'bg-[#e8f7fb] text-[#163f73]'}`}>{policy.dias}</div></td>
                                                                <td className="px-6 py-4 text-right"><span className="font-bold text-[#12334F] text-base">{formatCurrency(policy.total)}</span></td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* ========================================================= */}
                            {/* VISTAS EN CONSTRUCCIÓN                                    */}
                            {/* ========================================================= */}
                            <div className={['inicio', 'solicitudes', 'soporte'].includes(activeMenu) ? 'flex h-full items-center justify-center p-6' : 'hidden'}>
                                <div className="bg-white rounded-xl border border-gray-200 border-dashed w-full max-w-2xl p-12 text-center shadow-sm">
                                    <Shield size={64} className="mx-auto text-[#58C9E8] mb-4 opacity-50" />
                                    <h2 className="text-2xl font-bold text-[#163f73]">Módulo en construcción</h2>
                                    <p className="text-gray-500 mt-2">Esta sección ({menuItems.find(m => m.id === activeMenu)?.label}) estará disponible próximamente en su portal.</p>
                                </div>
                            </div>

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
